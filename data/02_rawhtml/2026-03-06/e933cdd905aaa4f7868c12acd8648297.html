e,"tags":[{"name":"giá cà phê","url":"/tag/gi%C3%A1-c%C3%A0-ph%C3%AA.epi"},{"name":"hồ tiêu","url":"/tag/h%E1%BB%93-ti%C3%AAu.epi"},{"name":"đảo chiều","url":"/tag/%C4%91%E1%BA%A3o-chi%E1%BB%81u.epi"},{"name":"đồng loạt","url":"/tag/%C4%91%E1%BB%93ng-lo%E1%BA%A1t.epi"},{"name":"tiêu trắng","url":"/tag/ti%C3%AAu-tr%E1%BA%AFng.epi"},{"name":"ASTA","url":"/tag/ASTA.epi"},{"name":"cà phê Arabica","url":"/tag/c%C3%A0-ph%C3%AA-Arabica.epi"},{"name":"tăng mạnh","url":"/tag/t%C4%83ng-m%E1%BA%A1nh.epi"},{"name":"Tây Nguyên","url":"/tag/T%C3%A2y-Nguy%C3%AAn.epi"},{"name":"cà phê","url":"/tag/c%C3%A0-ph%C3%AA.epi"},{"name":"bật","url":"/tag/b%E1%BA%ADt.epi"},{"name":"phục hồi","url":"/tag/ph%E1%BB%A5c-h%E1%BB%93i.epi"},{"name":"trọng điểm","url":"/tag/tr%E1%BB%8Dng-%C4%91i%E1%BB%83m.epi"},{"name":"cà phê Robusta","url":"/tag/c%C3%A0-ph%C3%AA-Robusta.epi"},{"name":"giao hàng","url":"/tag/giao-h%C3%A0ng.epi"},{"name":"Gia Lai","url":"/tag/Gia-Lai.epi"},{"name":"trong nước","url":"/tag/trong-n%C6%B0%E1%BB%9Bc.epi"},{"name":"Đắk Lắk","url":"/tag/%C4%90%E1%BA%AFk-L%E1%BA%AFk.epi"},{"name":"phiên giao dịch","url":"/tag/phi%C3%AAn-giao-d%E1%BB%8Bch.epi"},{"name":"tăng giảm","url":"/tag/t%C4%83ng-gi%E1%BA%A3m.epi"}],"topTags":[{"id":14779,"objectType":13,"name":"Giá cà phê","aliasName":["giá cà phê","Giá cà phê","giá cafe","Giá cafe"],"thumb":"","url":"/gia-ca-phe-tag14779.epi"},{"id":14778,"objectType":13,"name":"Giá hồ tiêu","aliasName":["giá hồ tiêu","Giá hồ tiêu"],"thumb":"","url":"/gia-ho-tieu-tag14778.epi"}],"bodys":[{"type":"image","content":"https://photo-baomoi.bmcdn.me/w700_r1/2026_03_06_578_54622242/7fa33d296f61863fdf70.jpg","contentOrigin":"https://photo-baomoi.bmcdn.me/w1000_r1/2026_03_06_578_54622242/7fa33d296f61863fdf70.jpg","lazyLoad":false,"width":700,"height":516,"widthOrigin":883,"heightOrigin":651,"originUrl":"https://thoibaotaichinhvietnam.vn/stores/news_dataimages/2026/032026/06/06/in_article/ngay-63-gia-ca-phe-va-ho-tieu-dao-chieu-bat-tang-dong-loat-20260306063014.jpg?rt=20260306063017"},{"type":"text","content":"\u003cem\u003eGiá cà phê trong nước hôm nay giao dịch trong khoảng 95.500 - 96.600 đồng/kg. Ảnh tư liệu\u003c/em\u003e","subType":"media-caption"},{"type":"text","content":"\u003cstrong\u003eGiá cà phê phục hồi trở lại\u003c/strong\u003e"},{"type":"text","content":"\u003ca class=\"tag-link\" href=\"/gia-ca-phe-tag14779.epi\"\u003eGiá cà phê\u003c/a\u003e trong nước,hôm nay đảo chiều phục hồi trở lại, tăng mạnh từ 1.200 - 1.300 đồng/kg. Hiện giá cà phê nội địa giao dịch trong khoảng 95.500 - 96.600 đồng/kg tại các vùng trọng điểm khu vực Tây Nguyên."},{"type":"text","content":"Cụ thể, giá cà phê Đắk Lắk đảo chiều tăng mạnh 1.200 đồng/kg so với ngày hôm qua, đạt mức 96.000 đồng/kg. Tương tự, giá cà phê tại tỉnh Gia Lai giao dịch ở mức 96.000 đồng/kg, cũng tăng 1.200 đồng/kg. Gia Lai và Đắk Lắk là 2 địa phương có mức giá cà phê cao nhất trên cả nước hôm nay."},{"type":"text","content":"Trong khi đó, giá cà phê hôm nay tại tỉnh Lâm Đồng hiện giao dịch ở mức 95.500 đồng/kg, tăng đến 1.300 đồng/kg."},{"type":"text","content":"Trên thị trường \u003ca class=\"tag-link\" href=\"/the-gioi.epi\"\u003ethế giới\u003c/a\u003e, giá cà phê tiếp tục ghi nhận phiên tăng nhẹ đồng loạt trên 2 sàn giao dịch quốc tế. Cụ thể, kết thúc phiên giao dịch gần nhất, giá cà phê Robusta tại London ghi nhận phiên tăng giảm đan xen trong các kỳ giao hàng. Trong đó, kỳ giao tháng 1/2026 tăng nhẹ 17 USD/tấn, đạt mức 3.806 USD/tấn. Trái lại, hợp đồng giao kỳ hạn tháng 11/2026 lại giảm nhẹ 1 USD/tấn, xuống mức 3.509 USD/tấn."},{"type":"text","content":"Trên sàn New York, giá cà phê Arabica tiếp tục ghi nhận phiên tăng nhẹ đồng loạt trong các kỳ giao hàng. Cụ thể, kỳ giao tháng 3/2026 tăng nhẹ 2,3 cent/lb, đạt mức 293,0 cent/lb. Cùng chiều, hợp đồng giao tháng 12/2026 cũng tăng nhẹ 2,9 cent/lb, đạt mức 273,85 cent/lb."},{"type":"text","content":"Giá cà phê Arabica trên sàn Brazil cũng ghi nhận phiên tăng nhẹ trong các kỳ giao hàng. Cụ thể: kỳ hạn tháng 3/2026 đạt mức 374,2 cent/lb, tăng 4,95 cent/lb so với hôm qua. Tương tự, kỳ giao hàng tháng 5/2026 cũng ghi nhận đảo chiều tăng nhẹ 0,5 cent/lb, lên mức 350,5 cent/lb."},{"type":"text","content":"\u003cstrong\u003eGiá tiêu đồng loạt từ 500 - 2.000 đồng/kg\u003c/strong\u003e"},{"type":"text","content":"Giá tiêu trong nước hôm nay đảo chiều tăng đồng loạt từ 500 - 2.000 đồng/kg so ngày hôm qua. Hiện giá tiêu trong nước dao động trong khoảng 144.000 - 146.000 đồng/kg."},{"type":"text","content":"Cụ thể, tại Gia Lai, \u003ca class=\"tag-link\" href=\"/gia-ho-tieu-tag14778.epi\"\u003egiá hồ tiêu\u003c/a\u003e hôm nay giao dịch ở mốc 144.000 đồng/kg, tăng nhẹ 500 đồng/kg. Tương tự, Đồng Nai giao dịch ở mức 144.000 đồng/kg, cũng tăng nhẹ 500 đồng/kg."},{"type":"text","content":"Tại \u003ca class=\"tag-link\" href=\"/tp-hcm-tag125.epi\"\u003eTP. Hồ Chí Minh\u003c/a\u003e, thương lái hôm nay thu mua hồ tiêu với giá 145.000 đồng/kg, tăng 1.000 đồng/kg. Trong khi đó, tại Đắk Lắk và Lâm Đồng giao dịch ở mốc 146.000 đồng/kg, đồng loạt tăng mạnh 2.000 đồng/kg."},{"type":"text","content":"Trên thị trường quốc tế, giá tiêu xuất khẩu hôm nay ghi nhận nhiều biến động mới từ thị trường Indonesia và Brazil. Các thị trường khác đều duy trì mức giá ổn định so với phiên giao dịch trước."},{"type":"text","content":"Cụ thể, giá tiêu đen Lampung của Indonesia được niêm yết ở mức 6.956 USD/tấn, giảm nhẹ 17 USD/tấn so ngày hôm qua; giá tiêu trắng Muntok cũng giảm 23 USD/tấn, hiện đạt mức 9.266 USD/tấn."},{"type":"text","content":"Giá tiêu Brazil hôm nay biến động mạnh, giảm sâu 125 USD/tấn so với phiên giao dịch ngày hôm qua. Hiện giá tiêu Brazil giao dịch ở mức 6.050 USD/tấn."},{"type":"text","content":"Tại Malaysia, giá tiêu đen ASTA ổn định ở mức 9.000 USD/tấn; giá tiêu trắng ASTA đạt 12.200 USD/tấn."},{"type":"text","content":"Giá tiêu trắng xuất khẩu của Việt Nam hôm nay không thay đổi, neo cao ở mức 9.350 USD/tấn; giá tiêu đen của Việt Nam loại 500 gr/l đạt mức 6.600 USD/tấn; tiêu đen Việt Nam loại 550 gr/l đạt 6.800 USD/tấn./."},{"type":"text","content":"\u003cstrong\u003eTuấn Anh (tổng hợp)\u003c/strong\u003e","subType":"body-author"}],"images":["https://photo-baomoi.bmcdn.me/w700_r1/2026_03_06_578_54622242/7fa33d296f61863fdf70.jpg"],"embedUrl":"","tournamentId":"","isRichFormat":false,"category":{"id":127,"name":"Chứng khoán","url":"/chung-khoan.epi","shortUrl":"chung-khoan"},"forceRedirectUrl":"/ngay-6-3-gia-ca-phe-va-ho-tieu-dao-chieu-bat-tang-dong-loat-r54622242.epi","cluster":{"id":10308925,"objectType":5,"name":"#cà phê Robusta","url":"/ca-phe-robusta-t18144022.epi","total":5532},"adBottomTVC":{"zoneId":"BaoMoi_ArticleBottomTVC","id":"BaoMoi_ArticleBottomTVC","elId":"BaoMoi_ArticleBottomTVC","type":"adNative"},"adBottomContent":["BaoMoi_Ariticle_Image"]},"sidebar":[{"sectionId":160,"url":"/app/get/sidebar","params":{"categoryId":45,"sectionIds":"119,102,115,104,121","pageType":0}}],"pageUrl":"/ngay-6-3-gia-ca-phe-va-ho-tieu-dao-chieu-bat-tang-dong-loat-r54622242.epi","checkPageUrl":true,"preloadImageUrl":"https://photo-baomoi.bmcdn.me/w700_r1/2026_03_06_578_54622242/7fa33d296f61863fdf70.jpg","title":"Ngày 6/3: Giá cà phê và hồ tiêu đảo chiều bật tăng đồng loạt","adMasthead":{"elId":"BaoMoi_Masthead","zoneId":"2006008566803555488","zoneAdaptive":"","adtimaConfig":{}}},"version":"v.0.4.78","timestamp":1773584622389},"userAgent":"mozilla/5.0 (windows nt 10.0; win64; x64)","isBot":false,"hostName":"baomoi.com","isRedirectPage":true,"isBlankLayout":true},"__N_SSP":true},"page":"/content/redirect/[id]","query":{"id":"54622242"},"buildId":"JWfAJyCY0tcMOsQhfz167","assetPrefix":"https://baomoi-static.bmcdn.me/web-v2/prod/v0.7.75","isFallback":false,"gssp":true,"scriptLoader":[]}</script></body></html>
