yên","url":"/tag/T%C3%A2y-Nguy%C3%AAn.epi"},{"name":"IPC","url":"/tag/IPC.epi"},{"name":"tồn kho","url":"/tag/t%E1%BB%93n-kho.epi"},{"name":"trọng điểm","url":"/tag/tr%E1%BB%8Dng-%C4%91i%E1%BB%83m.epi"},{"name":"Mũi Hảo Vọng","url":"/tag/M%C5%A9i-H%E1%BA%A3o-V%E1%BB%8Dng.epi"},{"name":"thương lái","url":"/tag/th%C6%B0%C6%A1ng-l%C3%A1i.epi"},{"name":"ổn định","url":"/tag/%E1%BB%95n-%C4%91%E1%BB%8Bnh.epi"},{"name":"logistic","url":"/tag/logistic.epi"},{"name":"nguồn cung","url":"/tag/ngu%E1%BB%93n-cung.epi"},{"name":"trái chiều","url":"/tag/tr%C3%A1i-chi%E1%BB%81u.epi"}],"bodys":[{"type":"text","content":"Theo khảo sát tại các vùng trồng tiêu trọng điểm, \u003ca class=\"tag-link\" href=\"/gia-ho-tieu-tag14778.epi\"\u003egiá hồ tiêu\u003c/a\u003e trong nước hiện dao động trong khoảng 144.000 - 146.000 đồng/kg và gần như không thay đổi so với những phiên gần đây."},{"type":"text","content":"Trong đó, Đắk Lắk và Lâm Đồng tiếp tục là hai địa phương có mức giá cao nhất, cùng đạt 146.000 đồng/kg. Tại TP.HCM, hồ tiêu được giao dịch ở mức khoảng 145.000 đồng/kg, trong khi Gia Lai và Đồng Nai ghi nhận mức giá thấp hơn, phổ biến khoảng 144.000 đồng/kg."},{"type":"text","content":"Theo các thương lái, nguồn cung từ vụ thu hoạch mới đang dần được bổ sung ra thị trường, song chưa tạo áp lực lớn lên giá nhờ nhu cầu xuất khẩu vẫn duy trì ở mức khá."},{"type":"text","content":"Trên thị trường quốc tế, giá hồ tiêu ghi nhận một số biến động nhỏ. Theo dữ liệu từ Hiệp hội Hồ tiêu Quốc tế (IPC), giá hồ tiêu đen xuất khẩu của Indonesia giảm nhẹ 0,19%, tương đương 13 USD/tấn, xuống còn 6.953 USD/tấn."},{"type":"text","content":"Trong khi đó, giá hồ tiêu tại nhiều quốc gia sản xuất lớn khác hầu như không thay đổi. Hồ tiêu đen Brazil loại ASTA 570 hiện giao dịch ở mức 6.050 USD/tấn, còn hồ tiêu đen của Malaysia duy trì ở mức 9.100 USD/tấn."},{"type":"image","content":"https://photo-baomoi.bmcdn.me/w700_r1/2026_03_08_237_54637959/4292b098fed0178e4ec1.jpg","contentOrigin":"https://photo-baomoi.bmcdn.me/w1000_r1/2026_03_08_237_54637959/4292b098fed0178e4ec1.jpg","lazyLoad":false,"width":700,"height":437,"widthOrigin":1600,"heightOrigin":1000,"originUrl":"https://dnsg.1cdn.vn/2026/03/08/ca-phe.jpg"},{"type":"text","content":"\u003cem\u003eGiá cà phê tăng nhẹ, hồ tiêu giữ ở mức ổn định. Ảnh minh họa\u003c/em\u003e","subType":"media-caption"},{"type":"text","content":"Đối với Việt Nam, giá hồ tiêu đen xuất khẩu vẫn ổn định trong khoảng 6.400 - 6.500 USD/tấn đối với loại 500 g/l và 550 g/l. Ở phân khúc hồ tiêu trắng, giá hồ tiêu trắng Muntok của Indonesia giảm nhẹ xuống 9.262 USD/tấn, trong khi giá hồ tiêu trắng của Malaysia và Việt Nam lần lượt đạt 12.100 USD/tấn và 9.150 USD/tấn."},{"type":"text","content":"Theo số liệu từ Hiệp hội Hồ tiêu và Cây gia vị Việt Nam, trong tháng 2/2026, Việt Nam xuất khẩu 13.969 tấn hồ tiêu, gồm 11.585 tấn hồ tiêu đen và 2.384 tấn hồ tiêu trắng, với tổng kim ngạch đạt khoảng 91,7 triệu USD."},{"type":"text","content":"So với tháng trước, lượng xuất khẩu giảm 35,8%, chủ yếu do trùng với kỳ nghỉ \u003ca class=\"tag-link\" href=\"/tet-nguyen-dan-tag14869.epi\"\u003eTết Nguyên đán\u003c/a\u003e kéo dài. Tuy nhiên, so với cùng kỳ năm 2025, mức giảm chỉ khoảng 2,5%."},{"type":"text","content":"Tính chung hai tháng đầu năm 2026, Việt Nam đã xuất khẩu 35.712 tấn hồ tiêu, mang về khoảng 230,7 triệu USD, tăng 30,3% về lượng và 24,7% về kim ngạch so với cùng kỳ năm trước."},{"type":"text","content":"Trong đó, Mỹ tiếp tục là thị trường nhập khẩu hồ tiêu lớn nhất của Việt Nam với khoảng 8.800 tấn, tăng 49,2% so với cùng kỳ. Trung Quốc đứng thứ hai với 4.900 tấn, tăng mạnh 221,7%, tiếp theo là UAE với 2.056 tấn, tăng 38,9%."},{"type":"text","content":"Trên thị trường cà phê, giá thu mua tại khu vực Tây Nguyên ngày 8/3 ghi nhận mức tăng 500 - 800 đồng/kg so với phiên trước."},{"type":"text","content":"Hiện \u003ca class=\"tag-link\" href=\"/gia-ca-phe-tag14779.epi\"\u003egiá cà phê\u003c/a\u003e dao động trong khoảng 96.300 - 96.700 đồng/kg. Trong đó, Lâm Đồng tiếp tục là địa phương có mức giá cao nhất, đạt 96.700 đồng/kg sau khi tăng khoảng 700 đồng/kg."},{"type":"text","content":"Tại Đắk Lắk và Gia Lai, giá cà phê cùng tăng 500 đồng/kg, hiện được thu mua ở mức khoảng 96.500 đồng/kg."},{"type":"text","content":"Theo các thương lái, đà tăng của thị trường quốc tế đã hỗ trợ giá cà phê trong nước nhích lên, dù mức điều chỉnh vẫn khá thận trọng."},{"type":"text","content":"Trên thị trường quốc tế, giá cà phê tiếp tục tăng trong phiên giao dịch ngày 7/3. Trên sàn London, cà phê robusta hợp đồng giao tháng 5/2026 tăng 21 USD/tấn lên 3.772 USD/tấn, trong khi hợp đồng giao tháng 7/2026 tăng 16 USD/tấn, đạt 3.679 USD/tấn."},{"type":"text","content":"Trên sàn New York, giá cà phê arabica tăng mạnh hơn. Hợp đồng giao tháng 5/2026 tăng 4,5 US cent/pound, lên 293,3 US cent/pound, còn hợp đồng giao tháng 7/2026 đạt 288,45 US cent/pound."},{"type":"text","content":"Theo hãng tin Reuters, tính chung cả tuần, giá arabica tăng khoảng 4,5%, trong khi robusta tăng khoảng 4%, phản ánh tâm lý lo ngại của thị trường về nguồn cung và rủi ro trong chuỗi logistics."},{"type":"text","content":"Một trong những yếu tố hỗ trợ giá cà phê là điều kiện \u003ca class=\"tag-link\" href=\"/tien-ich-thoi-tiet.epi\"\u003ethời tiết\u003c/a\u003e tại Brazil - quốc gia sản xuất cà phê lớn nhất thế giới. Một số khu vực trồng cà phê tại đây đang trải qua giai đoạn khô hạn, trong khi nhiều nông dân vẫn bán ra khá chậm do cho rằng mức giá hiện tại chưa đủ hấp dẫn."},{"type":"text","content":"Theo dữ liệu từ Ban Thư ký Ngoại thương Brazil (SECEX), xuất khẩu cà phê của nước này trong tháng 2/2026 giảm 16,2%, xuống còn khoảng 2,5 triệu bao. Tính chung hai tháng đầu năm, xuất khẩu đạt khoảng 4,97 triệu bao, giảm 31,5% so với cùng kỳ năm trước."},{"type":"text","content":"Bên cạnh đó, căng thẳng địa chính trị tại Trung Đông cũng đang gây áp lực lên hoạt động vận tải biển. Một số tuyến vận chuyển phải chuyển hướng qua Mũi Hảo Vọng, khiến thời gian vận chuyển kéo dài từ 7 - 14 ngày và làm chi phí logistics tăng đáng kể."},{"type":"text","content":"Dù thị trường đang được hỗ trợ bởi lo ngại về nguồn cung, sự gia tăng tồn kho trên các sàn giao dịch có thể hạn chế đà tăng của giá cà phê trong thời gian tới."},{"type":"text","content":"Theo dữ liệu mới nhất, lượng tồn kho arabica do ICE giám sát đã tăng lên 540.867 bao, mức cao nhất trong khoảng 5 tháng. Tương tự, tồn kho robusta trên sàn ICE cũng tăng lên 4.721 lô, mức cao nhất trong hơn 3 tháng."},{"type":"text","content":"Nhìn chung, giá cà phê hiện vẫn được hỗ trợ bởi những lo ngại về nguồn cung và rủi ro logistics toàn cầu. Tuy nhiên, sự gia tăng của tồn kho có thể khiến thị trường xuất hiện các nhịp điều chỉnh trong thời gian tới."},{"type":"text","content":"\u003cstrong\u003eVăn Tùng\u003c/strong\u003e","subType":"body-author"}],"images":["https://photo-baomoi.bmcdn.me/w700_r1/2026_03_08_237_54637959/4292b098fed0178e4ec1.jpg"],"embedUrl":"","tournamentId":"","isRichFormat":false,"category":{"id":45,"name":"Kinh tế","url":"/kinh-te.epi","shortUrl":"kinh-te"},"forceRedirectUrl":"/gia-ca-phe-tang-nhe-ho-tieu-giu-o-muc-on-dinh-r54637959.epi","cluster":{"id":20026991,"objectType":5,"name":"#g/l","url":"/g-l-t18144022.epi","total":4669},"adBottomTVC":{"zoneId":"BaoMoi_ArticleBottomTVC","id":"BaoMoi_ArticleBottomTVC","elId":"BaoMoi_ArticleBottomTVC","type":"adNative"}},"sidebar":[{"sectionId":160,"url":"/app/get/sidebar","params":{"categoryId":45,"sectionIds":"119,102,115,104,121","pageType":0}}],"pageUrl":"/gia-ca-phe-tang-nhe-ho-tieu-giu-o-muc-on-dinh-r54637959.epi","checkPageUrl":true,"preloadImageUrl":"https://photo-baomoi.bmcdn.me/w700_r1/2026_03_08_237_54637959/4292b098fed0178e4ec1.jpg","title":"Giá cà phê tăng nhẹ, hồ tiêu giữ ở mức ổn định"},"version":"v.0.4.78","timestamp":1773654283245},"userAgent":"mozilla/5.0 (windows nt 10.0; win64; x64)","isBot":false,"hostName":"baomoi.com","isRedirectPage":true,"isBlankLayout":true},"__N_SSP":true},"page":"/content/redir
