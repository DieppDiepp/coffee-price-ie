g-loat-tang-manh-do-cang-thang-trung-dong-20260309075830.jpg?rt=20260309075832"},{"type":"text","content":"\u003cem\u003eGiá cà phê hôm nay tăng mạnh trên các sàn giao dịch, kéo giá trong nước lên gần 97.000 đồng/kg. Ảnh tư liệu\u003c/em\u003e","subType":"media-caption"},{"type":"text","content":"\u003cstrong\u003eGiá cà phê \u003ca class=\"tag-link\" href=\"/the-gioi.epi\"\u003ethế giới\u003c/a\u003e tăng mạnh\u003c/strong\u003e"},{"type":"text","content":"Thị trường cà phê thế giới ghi nhận một tuần tăng giá mạnh khi những lo ngại về chuỗi cung ứng và chi phí vận chuyển toàn cầu gia tăng do căng thẳng địa chính trị tại \u003ca class=\"tag-link\" href=\"/trung-dong-tag14499.epi\"\u003eTrung Đông\u003c/a\u003e. Diễn biến này đã kéo giá cà phê nội địa Việt Nam tăng trở lại, trong khi nông dân tại các vùng trồng trọng điểm ở Tây Nguyên có xu hướng bán ra chậm hơn nhằm chờ mức giá tốt hơn."},{"type":"text","content":"Trên thị trường quốc tế, \u003ca class=\"tag-link\" href=\"/gia-ca-phe-tag14779.epi\"\u003egiá cà phê\u003c/a\u003e trong tuần qua tăng với biên độ mạnh hơn so với thị trường nội địa Việt Nam. Cụ thể, trên sàn London, giá cà phê Robusta hợp đồng giao tháng 5/2026 đóng cửa tuần ở mức 3.772 USD/tấn, tăng 4,1% (148 USD/tấn) so với tuần trước. Hợp đồng giao tháng 7/2026 cũng tăng 3,6% (127 USD/tấn), đạt 3.679 USD/tấn."},{"type":"text","content":"Trên sàn New York, giá cà phê Arabica giao tháng 5/2026 tăng 4,5% (12,6 US cent/pound), lên 293,3 US cent/pound. Hợp đồng giao tháng 7/2026 tăng 2,7% (7,7 US cent/pound), đạt 288,45 US cent/pound."},{"type":"text","content":"Trong nước, giá cà phê trong tuần qua dao động trong khoảng 96.300 - 96.700 đồng/kg, tăng 500 – 800 đồng/kg so với tuần trước."},{"type":"text","content":"Trong đó, \u003ca class=\"tag-link\" href=\"/dak-nong-tag68.epi\"\u003eĐắk Nông\u003c/a\u003e tiếp tục là địa phương có mức giá cao nhất khu vực, đạt 96.700 đồng/kg, tăng khoảng 700 đồng/kg so với tuần trước. Tại Đắk Lắk và Gia Lai, giá cà phê cùng tăng 500 đồng/kg, hiện được thu mua ở mức 96.500 đồng/kg."},{"type":"text","content":"Lâm Đồng ghi nhận mức tăng mạnh nhất trong tuần với 800 đồng/kg, đưa giá thu mua lên khoảng 96.300 đồng/kg. Theo các thương lái, dù thị trường quốc tế tăng khá mạnh nhưng giá trong nước điều chỉnh chậm hơn do nguồn cung từ vụ thu hoạch vẫn đang được bổ sung ra thị trường."},{"type":"text","content":"\u003cstrong\u003eGiá tiêu nhích thêm khoảng 500 đồng/kg\u003c/strong\u003e"},{"type":"text","content":"Thị trường hồ tiêu trong nước hôm nay tăng nhẹ sau nhiều phiên điều chỉnh giảm trước đó. Theo khảo sát tại các địa phương trồng tiêu trọng điểm, giá tiêu hiện giao động trong khoảng 144.500 - 146.500 đồng/kg, tăng nhẹ khoảng 500 đồng/kg so với ngày hôm trước."},{"type":"text","content":"Đắk Lắk và Đắk Nông hiện đang có mức giá cao nhất thị trường, đạt 146.500 đồng/kg. Tại \u003ca class=\"tag-link\" href=\"/tp-hcm-tag125.epi\"\u003eBà Rịa - Vũng Tàu\u003c/a\u003e (TP. HCM), giá tiêu giữ ổn định ở mức 145.000 đồng/kg. Trong khi đó, Gia Lai và Đồng Nai đang giao dịch ở mức 144.500 đồng/kg."},{"type":"text","content":"Dù giá đã nhích lên, nhưng so với tuần trước, mặt bằng giá tiêu nội địa vẫn giảm khá rõ. Cụ thể, giá tại Đắk Lắk và Đắk Nông giảm khoảng 1.500 đồng/kg, còn Bà Rịa - Vũng Tàu (TP. HCM), \u003ca class=\"tag-link\" href=\"/gia-lai-tag2858.epi\"\u003eGia Lai\u003c/a\u003e và Đồng Nai giảm khoảng 3.000 đồng/kg so với tuần trước."},{"type":"text","content":"Trên thị trường quốc tế, \u003ca class=\"tag-link\" href=\"/gia-ho-tieu-tag14778.epi\"\u003egiá hồ tiêu\u003c/a\u003e trong tuần qua cũng ghi nhận xu hướng giảm tại một số quốc gia sản xuất lớn. Theo dữ liệu từ Hiệp hội Hồ tiêu Quốc tế, giá tiêu đen xuất khẩu của Indonesia hiện đạt 6.953 USD/tấn, giảm 0,82% (58 USD/tấn) so với tuần trước."},{"type":"text","content":"Giá tiêu đen Brazil ASTA 570 cũng giảm khoảng 125 USD/tấn, xuống còn 6.050 USD/tấn. Trong khi đó, giá tiêu đen Malaysia vẫn giữ ổn định ở mức 9.100 USD/tấn."},{"type":"text","content":"Đối với Việt Nam, giá tiêu đen xuất khẩu tiếp tục đi ngang trong khoảng 6.400 - 6.500 USD/tấn đối với loại 500 g/l và 550 g/l."},{"type":"text","content":"Ở phân khúc tiêu trắng, giá tiêu trắng Muntok \u003ca class=\"tag-link\" href=\"/indonesia-tag12336.epi\"\u003eIndonesia\u003c/a\u003e giảm nhẹ xuống còn 9.262 USD/tấn. Trong khi đó, giá tiêu trắng của Malaysia và Việt Nam vẫn ổn định ở mức lần lượt 12.100 USD/tấn và 9.150 USD/tấn./."},{"type":"text","content":"\u003cstrong\u003eTuấn Anh (tổng hợp)\u003c/strong\u003e","subType":"body-author"}],"images":["https://photo-baomoi.bmcdn.me/w700_r1/2026_03_09_578_54643005/be81abc8e3800ade5391.jpg"],"embedUrl":"","tournamentId":"","isRichFormat":false,"category":{"id":45,"name":"Kinh tế","url":"/kinh-te.epi","shortUrl":"kinh-te"},"forceRedirectUrl":"/ngay-9-3-gia-ca-phe-va-ho-tieu-dong-loat-tang-manh-do-cang-thang-trung-dong-r54643005.epi","cluster":{"id":20026991,"objectType":5,"name":"#g/l","url":"/g-l-t18144022.epi","total":4669},"adBottomTVC":{"zoneId":"BaoMoi_ArticleBottomTVC","id":"BaoMoi_ArticleBottomTVC","elId":"BaoMoi_ArticleBottomTVC","type":"adNative"},"adBottomContent":["BaoMoi_Ariticle_Image"]},"sidebar":[{"sectionId":160,"url":"/app/get/sidebar","params":{"categoryId":45,"sectionIds":"119,102,115,104,121","pageType":0}}],"pageUrl":"/ngay-9-3-gia-ca-phe-va-ho-tieu-dong-loat-tang-manh-do-cang-thang-trung-dong-r54643005.epi","checkPageUrl":true,"preloadImageUrl":"https://photo-baomoi.bmcdn.me/w700_r1/2026_03_09_578_54643005/be81abc8e3800ade5391.jpg","title":"Ngày 9/3: Giá cà phê và hồ tiêu đồng loạt tăng mạnh do căng thẳng Trung Đông","adMasthead":{"elId":"BaoMoi_Masthead","zoneId":"2006008566803555488","zoneAdaptive":"","adtimaConfig":{}}},"version":"v.0.4.78","timestamp":1773654372305},"userAgent":"mozilla/5.0 (windows nt 10.0; win64; x64)","isBot":false,"hostName":"baomoi.com","isRedirectPage":true,"isBlankLayout":true},"__N_SSP":true},"page":"/content/redirect/[id]","query":{"id":"54
