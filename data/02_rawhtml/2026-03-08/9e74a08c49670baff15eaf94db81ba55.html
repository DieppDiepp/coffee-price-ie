abica.epi"},{"name":"chậm","url":"/tag/ch%E1%BA%ADm.epi"},{"name":"dao động","url":"/tag/dao-%C4%91%E1%BB%99ng.epi"},{"name":"nguồn cung","url":"/tag/ngu%E1%BB%93n-cung.epi"},{"name":"thị trường quốc tế","url":"/tag/th%E1%BB%8B-tr%C6%B0%E1%BB%9Dng-qu%E1%BB%91c-t%E1%BA%BF.epi"},{"name":"tâm lý","url":"/tag/t%C3%A2m-l%C3%BD.epi"},{"name":"phí bảo hiểm","url":"/tag/ph%C3%AD-b%E1%BA%A3o-hi%E1%BB%83m.epi"}],"bodys":[{"type":"text","content":"Trong đó, tại \u003ca class=\"tag-link\" href=\"/dak-nong-tag68.epi\"\u003eĐắk Nông\u003c/a\u003e (cũ) có giá thu mua cao nhất khu vực, đạt 96.700 đồng/kg."},{"type":"text","content":"Tại Đắk Lắk và Gia Lai, \u003ca class=\"tag-link\" href=\"/gia-ca-phe-tag14779.epi\"\u003egiá cà phê\u003c/a\u003e được giao dịch ở mức 96.500 đồng/kg. Trong khi đó, Lâm Đồng vẫn là địa phương có mức giá thấp nhất trong khu vực, khoảng 96.300 đồng/kg."},{"type":"text","content":"Mặc dù giá cà phê trên thị trường quốc tế tăng khá mạnh nhưng giá trong nước điều chỉnh chậm hơn do nguồn cung từ vụ thu hoạch vẫn đang tiếp tục được đưa ra thị trường."},{"type":"image","content":"https://photo-baomoi.bmcdn.me/w700_r1/2026_03_10_594_54651749/d9619377d83f3161682e.jpg","contentOrigin":"https://photo-baomoi.bmcdn.me/w1000_r1/2026_03_10_594_54651749/d9619377d83f3161682e.jpg","lazyLoad":false,"width":700,"height":367,"widthOrigin":1200,"heightOrigin":630,"originUrl":"https://media.vnbusiness.vn/files/uploads/2026/03/10/b0fe8f24d76a4e6192c1fe1c0531103e-5638.jpg?w=1200"},{"type":"text","content":"\u003cem\u003eGiá cà phê giữ ổn định ở các vùng trồng.\u003c/em\u003e","subType":"media-caption"},{"type":"text","content":"Tuy vậy, trước xu hướng giá \u003ca class=\"tag-link\" href=\"/the-gioi.epi\"\u003ethế giới\u003c/a\u003e tăng trở lại, nhiều nông dân tại Tây Nguyên đang có tâm lý giữ hàng, bán ra chậm để chờ mức giá tốt hơn trong thời gian tới."},{"type":"text","content":"Bộ Nông nghiệp và Môi trường cho biết, trong 2 tháng đầu năm nay, xuất khẩu cà phê đạt trên 395.000 tấn, tăng 23% so với cùng kỳ năm trước và giá trị là 1,9 tỉ USD tăng 6,3%."},{"type":"text","content":"Tuy nhiên, do xu hướng hạ nhiệt của thị trường thế giới nên giá cà phê xuất khẩu bình quân trong tháng 1 giảm 13,5% và đứng ở mức 4.791 USD/tấn."},{"type":"text","content":"Thời gian gần đây, dù nguồn cung đã được cải thiện nhưng thực tế vẫn còn thấp hơn đáng kể so với nhu cầu của thị trường. Trong bối cảnh đó, các nhà rang xay châu Âu nhiều khả năng sẽ tăng mua và tăng dự trữ để ổn định sản xuất. Giá cà phê có thể sẽ tiếp tục tăng trong thời gian tới nhưng ít có khả năng tăng mạnh như những năm trước. Xung đột địa chính trị vẫn là \"ẩn số\" có thể đẩy giá tăng thêm nếu tình trạng gián đoạn vận tải kéo dài."},{"type":"text","content":"Trên thế giới, tại sàn London, ngoại trừ giá cà phê robusta kỳ hạn giao tháng 3/2026 tăng 21 USD (+0,55%) lên 3.827 USD/tấn, các kỳ hạn khác đều giảm nhẹ. Hợp đồng giao tháng 5/2026 giảm 1 USD/tấn (-0,03%) xuống 3.771 USD/tấn, kỳ hạn giao tháng 7/2026 giảm 9 USD/tấn (-0,24) xuống 3.670 USD/tấn. Các kỳ hạn khác cũng giảm 4-10 USD/tấn."},{"type":"text","content":"Trái lại, trên sàn New York, giá cà phê arabica giao tháng 3/2026 tăng 4,15 US cent/pound (+1,39%) lên 301,75 US cent/pound. Tương tự, giá cà phê giao tháng 5/2026 tăng 3,6 US cent/pound (+1,23%) lên 296,9 US cent/pound, kỳ hạn giao tháng 7/2026 tăng 2,45 US cent/pound (+0,85%) lên 290,9 US cent/pound. Các kỳ hạn khác cũng tăng 1,25-1,8 US cent/pound."},{"type":"text","content":"Giá cà phê tiếp tục được hỗ trợ bởi nguy cơ gián đoạn nguồn cung, khi xung đột tại Trung Đông đã làm đình trệ hoạt động vận chuyển qua eo biển Hormuz. Việc tuyến đường biển này bị ảnh hưởng sẽ làm tăng cước vận tải biển toàn cầu, phí bảo hiểm và chi phí nhiên liệu, đồng thời làm tăng chi phí đối với các nhà nhập khẩu và rang xay cà phê."},{"type":"text","content":"Tuy vậy, giá cà phê bị hạn chế phần nào bởi mức tăng nhẹ của đồng USD trong phiên thứ Hai."},{"type":"text","content":"Sự phục hồi của tồn kho cà phê trên ICE là yếu tố bất lợi cho giá. Tồn kho arabica được ICE theo dõi đã giảm xuống mức thấp nhất 1,75 năm là 396.513 bao vào ngày 18/11/2025, nhưng sau đó phục hồi lên mức cao nhất 5 tháng là 553.379 bao vào thứ Hai."},{"type":"text","content":"Tương tự, tồn kho robusta trên ICE giảm xuống mức thấp nhất 14 tháng là 4.012 lô hôm 10/12/2025, nhưng phục hồi lên mức cao nhất 3,25 tháng là 4.721 lô vào ngày 3/3."},{"type":"text","content":"\u003cstrong\u003eNhư Yến\u003c/strong\u003e","subType":"body-author"}],"images":["https://photo-baomoi.bmcdn.me/w700_r1/2026_03_10_594_54651749/d9619377d83f3161682e.jpg"],"embedUrl":"","tournamentId":"","isRichFormat":false,"category":{"id":45,"name":"Kinh tế","url":"/kinh-te.epi","shortUrl":"kinh-te"},"forceRedirectUrl":"/gia-ca-phe-duy-tri-muc-96-700-dong-kg-nguoi-dan-van-giu-hang-r54651749.epi","cluster":{"id":36880020,"objectType":5,"name":"#Arabica","url":"/arabica-t18144022.epi","total":1921},"adBottomTVC":{"zoneId":"BaoMoi_ArticleBottomTVC","id":"BaoMoi_ArticleBottomTVC","elId":"BaoMoi_ArticleBottomTVC","type":"adNative"}},"sidebar":[{"sectionId":160,"url":"/app/get/sidebar","params":{"categoryId":45,"sectionIds":"119,102,115,104,121","pageType":0}}],"pageUrl":"/gia-ca-phe-duy-tri-muc-96-700-dong-kg-nguoi-dan-van-giu-hang-r54651749.epi","checkPageUrl":true,"preloadImageUrl":"https://photo-baomoi.bmcdn.me/w700_r1/2026_03_10_594_54651749/d9619377d83f3161682e.jpg","title":"Giá cà phê duy trì mức 96.700 đồng/kg, người dân vẫn giữ hàng"},"version":"v.0.4.78","timestamp":1773584698833},"userAgent":"mozilla/5.0 (windows nt 10.0; win64; x64)","isBot":false,"hostName":"baomoi.com","isRedirectPage":true,"isBlankLayout":true},"__N_SSP":true},"page":"/content/redirect/[id]","query":{"id":"54651749"},"buildId":"JWfAJyCY0tcMOsQhfz167","assetPrefix":"https://baomoi-static.bmcdn.me/web-v2/prod/v0.7.75","isFallback":false,"gssp":true,"scriptLoader":[]}</script></body></html>
