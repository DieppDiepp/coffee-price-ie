"giảm mạnh","url":"/tag/gi%E1%BA%A3m-m%E1%BA%A1nh.epi"},{"name":"cà phê","url":"/tag/c%C3%A0-ph%C3%AA.epi"},{"name":"Muntok Indonesia","url":"/tag/Muntok-Indonesia.epi"},{"name":"Đồng bằng sông Cửu Long","url":"/tag/%C4%90%E1%BB%93ng-b%E1%BA%B1ng-s%C3%B4ng-C%E1%BB%ADu-Long.epi"},{"name":"g/l","url":"/tag/g%2Fl.epi"},{"name":"OM 18","url":"/tag/OM-18.epi"},{"name":"giảm nhẹ","url":"/tag/gi%E1%BA%A3m-nh%E1%BA%B9.epi"},{"name":"Thái VIP","url":"/tag/Th%C3%A1i-VIP.epi"},{"name":"Sáu Hữu","url":"/tag/S%C3%A1u-H%E1%BB%AFu.epi"},{"name":"Đài Thơm 8","url":"/tag/%C4%90%C3%A0i-Th%C6%A1m-8.epi"},{"name":"bán xuất khẩu","url":"/tag/b%C3%A1n-xu%E1%BA%A5t-kh%E1%BA%A9u.epi"},{"name":"Real Brazil","url":"/tag/Real-Brazil.epi"},{"name":"ASTA 570","url":"/tag/ASTA-570.epi"},{"name":"Chuồng Bò","url":"/tag/Chu%E1%BB%93ng-B%C3%B2.epi"}],"topTags":[{"id":12336,"objectType":13,"name":"Indonesia","aliasName":["Indonesia"],"thumb":"https://photo-baomoi.bmcdn.me/w100_r1x1/4726d6c8d88531db6894.png","url":"/indonesia-tag12336.epi"},{"id":2566,"objectType":13,"name":"Brazil","aliasName":["Brazil"],"thumb":"https://photo-baomoi.bmcdn.me/w100_r1x1/25b8c7f4ddb934e76da8.jpg","url":"/brazil-tag2566.epi"}],"bodys":[{"type":"text","content":"Thị trường nông sản ngày 5/3 ghi nhận diễn biến trái chiều giữa các nhóm hàng chủ lực. \u003ca class=\"tag-link\" href=\"/gia-ca-phe-tag14779.epi\"\u003eGiá cà phê\u003c/a\u003e và hồ tiêu cùng giảm tại thị trường nội địa lẫn quốc tế, trong khi sầu riêng tiếp tục duy trì mặt bằng giá cao tại khu vực Đồng bằng sông Cửu Long. Lúa gạo trong nước nhìn chung ổn định, hoạt động giao dịch nội địa khởi sắc hơn dù giá gạo xuất khẩu giảm nhẹ so với đầu tuần."},{"type":"text","content":"Tại thị trường hồ tiêu trong nước, giá sáng 5/3 giảm mạnh từ 1.500 đến 2.000 đồng/kg so với ngày trước đó, dao động trong khoảng 143.500 – 144.000 đồng/kg. Việc nhiều địa phương bước vào cao điểm thu hoạch khiến nguồn cung tăng lên, tạo áp lực điều chỉnh giá."},{"type":"image","content":"https://photo-baomoi.bmcdn.me/w700_r1/2026_03_05_419_54614363/d8259e9fced727897ec6.jpg","contentOrigin":"https://photo-baomoi.bmcdn.me/w1000_r1/2026_03_05_419_54614363/d8259e9fced727897ec6.jpg","lazyLoad":false,"width":700,"height":540,"widthOrigin":1024,"heightOrigin":791,"originUrl":"https://bqn.1cdn.vn/2026/03/04/phanbonmyviet.com-wp-content-uploads-2017-09-_tru-song-cho-tieu-4.jpg"},{"type":"text","content":"Cụ thể, Đắk Lắk, Đắk Nông và Bà Rịa – Vũng Tàu cùng giảm 2.000 đồng/kg, xuống còn 144.000 đồng/kg. Gia Lai giảm 2.000 đồng/kg còn 143.500 đồng/kg, trong khi Đồng Nai giảm 1.500 đồng/kg xuống 143.500 đồng/kg."},{"type":"text","content":"Trên thị trường \u003ca class=\"tag-link\" href=\"/the-gioi.epi\"\u003ethế giới\u003c/a\u003e, dữ liệu từ Hiệp hội Hồ tiêu Quốc tế cho thấy giá tiêu đen Indonesia đạt 6.956 USD/tấn, giảm 0,24%. Giá tiêu đen Brazil ASTA 570 giảm 2,07% xuống 6.050 USD/tấn, còn tiêu đen Malaysia giữ ở mức 9.100 USD/tấn."},{"type":"text","content":"Giá tiêu xuất khẩu của Việt Nam duy trì ổn định trong khoảng 6.400 – 6.500 USD/tấn đối với loại 500 g/l và 550 g/l. Tiêu trắng Muntok \u003ca class=\"tag-link\" href=\"/indonesia-tag12336.epi\"\u003eIndonesia\u003c/a\u003e giảm nhẹ còn 9.266 USD/tấn, trong khi Malaysia giữ mức 12.100 USD/tấn và Việt Nam ở mức 9.150 USD/tấn."},{"type":"text","content":"Dù tháng 2/2026 trùng kỳ nghỉ \u003ca class=\"tag-link\" href=\"/tet-nguyen-dan-tag14869.epi\"\u003eTết Nguyên đán\u003c/a\u003e khiến xuất khẩu hồ tiêu chỉ đạt khoảng 14.000 tấn, trị giá 92 triệu USD, giảm mạnh so với tháng trước, nhưng tính chung hai tháng đầu năm 2026 xuất khẩu vẫn đạt 35.000 tấn với trị giá 231 triệu USD, tăng hơn 30% về lượng so với cùng kỳ năm 2025."},{"type":"text","content":"Tại Đồng Nai, địa phương có hơn 23.300 ha trồng tiêu, vụ thu hoạch năm nay diễn ra từ tháng 3 đến hết tháng 4. Năng suất dự kiến tăng 5–10% so với năm ngoái. Dù giá hiện thấp hơn mức đỉnh trên 200.000 đồng/kg của năm trước, mặt bằng giá đầu vụ khoảng 148.000 – 152.000 đồng/kg vẫn giúp nông dân ghi nhận lợi nhuận tích cực. Năm 2025, kim ngạch xuất khẩu hồ tiêu của tỉnh đạt 185 triệu USD, tăng 8,5% và được kỳ vọng tiếp tục duy trì đà tăng trong năm 2026."},{"type":"text","content":"Giá cà phê trong nước tại khu vực Tây Nguyên sáng 5/3 cũng giảm mạnh từ 1.100 đến 1.400 đồng/kg, dao động trong khoảng 94.200 – 95.000 đồng/kg. Đắk Nông giảm 1.300 đồng/kg xuống 95.000 đồng/kg và vẫn là địa phương có mức giá cao nhất khu vực. Đắk Lắk và Gia Lai cùng giảm 1.400 đồng/kg còn 94.800 đồng/kg, trong khi Lâm Đồng giảm 1.100 đồng/kg xuống 94.200 đồng/kg, thấp nhất vùng."},{"type":"image","content":"https://photo-baomoi.bmcdn.me/w700_r1/2026_03_05_419_54614363/29cf7975293dc063992c.jpg","contentOrigin":"https://photo-baomoi.bmcdn.me/w1000_r1/2026_03_05_419_54614363/29cf7975293dc063992c.jpg","lazyLoad":true,"width":700,"height":433,"widthOrigin":1000,"heightOrigin":619,"originUrl":"https://bqn.1cdn.vn/2026/03/04/media.baovanhoa.vn-zoom-1000-uploaded-hungnv-2026_02_27-_gia_ca_phe_hom_nay_27-2-2026_bpec.jpg"},{"type":"text","content":"Trên thị trường thế giới, giá cà phê robusta trên sàn London quay đầu giảm sau khi đạt đỉnh hai tuần trước đó. Hợp đồng giao tháng 5/2026 giảm 1,77% xuống còn 3.705 USD/tấn, còn hợp đồng tháng 7/2026 giảm 1,4% xuống 3.624 USD/tấn. Giá arabica trên sàn New York cũng điều chỉnh khi hợp đồng tháng 5/2026 giảm xuống 286,95 US cent/pound."},{"type":"text","content":"Theo phân tích của Barchart, nguyên nhân chính khiến giá cà phê giảm là đồng Real \u003ca class=\"tag-link\" href=\"/brazil-tag2566.epi\"\u003eBrazil\u003c/a\u003e suy yếu so với USD. Khi đồng nội tệ giảm giá, các nhà sản xuất Brazil tăng bán xuất khẩu để hưởng lợi từ tỷ giá, làm nguồn cung toàn cầu tăng lên và gây áp lực lên giá kỳ hạn."},{"type":"text","content":"Trái với xu hướng của cà phê và hồ tiêu, giá sầu riêng tại nhiều kho lớn ở Đồng bằng sông Cửu Long tiếp tục duy trì ở mức cao. Sầu riêng Thái VIP loại A dao động trong khoảng 158.000 – 170.000 đồng/kg, loại B từ 138.000 – 150.000 đồng/kg và loại C từ 70.000 – 85.000 đồng/kg. Các loại hàng dạt hoặc phân khúc thấp hơn có giá từ 22.000 đến 70.000 đồng/kg tùy loại."},{"type":"image","content":"https://photo-baomoi.bmcdn.me/w700_r1/2026_03_05_419_54614363/4d25659f35d7dc8985c6.jpg","contentOrigin":"https://photo-baomoi.bmcdn.me/w1000_r1/2026_03_05_419_54614363/4d25659f35d7dc8985c6.jpg","lazyLoad":true,"width":700,"height":449,"widthOrigin":1837,"heightOrigin":1179,"originUrl":"https://bqn.1cdn.vn/2026/03/04/thuongtruong-fileserver.nvcms.net-images-2025-10-10-_20251010075740-4img_0275.jpeg"},{"type":"text","content":"Sầu riêng Ri6 loại A được thu mua ở mức 100.000 – 108.000 đồng/kg, loại B từ 85.000 – 93.000 đồng/kg và loại C khoảng 60.000 – 63.000 đồng/kg. Musang King loại A giữ mức 130.000 – 135.000 đồng/kg. Một số giống khác như Chuồng Bò và Sáu Hữu cũng duy trì mức cao ở phân khúc loại A, phổ biến từ 85.000 đến 90.000 đồng/kg."},{"type":"text","content":"Mặt bằng giá cao của sầu riêng phản ánh nhu cầu thị trường vẫn ổn định, đặc biệt đối với các lô hàng đạt tiêu chuẩn xuất khẩu."},{"type":"text","content":"Đối với lúa gạo, thị trường tại Đồng bằng sông Cửu Long nhìn chung giữ ổn định. Lúa tươi OM 18 và Đài Thơm 8 dao động trong khoảng 6.500 – 6.700 đồng/kg, IR 50404 ở mức 5.400 – 5.500 đồng/kg và OM 5451 từ 5.800 – 6.000 đồng/kg. Hoạt động mua bán nội địa có dấu hiệu khởi sắc hơn khi nguồn cung về đều và giá giữ vững."},{"type":"text","content":"Giá gạo nguyên liệu điều chỉnh nhẹ ở một số mặt hàng. Đài Thơm 8 giảm 200 đồng/kg còn 9.150 – 9.350 đồng/kg, CL 555 giảm 50 đồng/kg, còn các loại IR 504, OM 18, OM 5451 và OM 380 dao động nhẹ quanh mặt bằng cũ."},{"type":"text","content":"Ở thị trường bán lẻ, giá gạo nhìn chung đứng yên. Gạo Nàng Nhen có mức giá cao nhất khoảng 28.000 đồng/kg, gạo Jasmine dao động 13.000 – 14.000 đồng/kg, còn gạo trắng thông dụng khoảng 16.000 đồng/kg."},{"type":"text","content":"Theo Hiệp hội Lương thực Việt Nam, giá gạo xuất khẩu của Việt Nam giảm nhẹ so với đầu tuần. Gạo 5% tấm ở mức 400 – 415 USD/tấn, gạo Jasmine 430 – 434 USD/tấn giảm 1 USD/tấn và gạo 100% tấm dao động 316 – 320 USD/tấn."},{"type":"text","content":"Diễn biến thị trường ngày 5/3 cho thấy sự phân hóa rõ giữa các nhóm nông sản. Cà phê và hồ tiêu chịu áp lực từ yếu tố cung – cầu và biến động tiền tệ quốc tế, sầu riêng vẫn giữ được mặt bằng giá cao nhờ nhu cầu ổn định, còn lúa gạo trong nước duy trì giao dịch tích cực dù giá xuất khẩu có dấu hiệu điều chỉnh nhẹ."},{"type":"text","content":"\u003cstrong\u003ePHỐ HỘI\u003c/strong\u003e","subType":"body-author"}],"images":["https://photo-baomoi.bmcdn.me/w700_r1/2026_03_05_419_54614363/d8259e9fced727897ec6.jpg","https://photo-baomoi.bmcdn.me/w700_r1/2026_03_05_419_54614363/29cf7975293dc063992c.jpg","https://photo-baomoi.bmcdn.me/w700_r1/2026_03_05_419_54614363/4d25659f35d7dc8985c6.jpg"],"embedUrl":"","tournamentId":"","isRichFormat":false,"category":{"id":45,"name":"Kinh tế","url":"/kinh-te.epi","shortUrl":"kinh-te"},"forceRedirectUrl":"/gia-nong-san-hom-nay-5-3-2026-ca-phe-ho-tieu-giam-manh-sau-rieng-van-neo-cao-lua-gao-on-dinh-r54614363.epi","cluster":{"id":20461396,"objectType":5,"name":"#Đài Thơm 8","url":"/dai-thom-8-t20461396.epi","total":3186},"adBottomTVC":{"zoneId":"BaoMoi_ArticleBottomTVC","id":"BaoMoi_ArticleBottomTVC","elId":"BaoMoi_ArticleBottomTVC","type":"adNative"}},"sidebar":[{"sectionId":160,"url":"/app/get/sidebar","params":{"categoryId":45,"sectionIds":"119,102,115,104,121","pageType":0}}],"pageUrl":"/gia-nong-san-hom-nay-5-3-2026-ca-phe-ho-tieu-giam-manh-sau-rieng-van-neo-cao-lua-gao-on-dinh-r54614363.epi","checkPageUrl":true,"preloadImageUrl":"https://photo-baomoi.bmcdn.me/w700_r1/2026_03_05_419_54614363/d8259e9fced727897ec6.jpg","title":"Giá nông sản hôm nay 5/3/2026: Cà phê, hồ tiêu giảm mạnh, sầu riêng vẫn neo cao, lúa gạo ổn định"},"version":"v.0.4.78","timestamp":1773654162973},"userAgent":"mozilla/5.0 (windows nt 10.0; win64; x64)","isBot":false,"hostName"
