mạnh","url":"/tag/gi%E1%BA%A3m-m%E1%BA%A1nh.epi"},{"name":"đồng loạt","url":"/tag/%C4%91%E1%BB%93ng-lo%E1%BA%A1t.epi"},{"name":"tiêu trắng","url":"/tag/ti%C3%AAu-tr%E1%BA%AFng.epi"},{"name":"ASTA","url":"/tag/ASTA.epi"},{"name":"sụt giảm","url":"/tag/s%E1%BB%A5t-gi%E1%BA%A3m.epi"},{"name":"biến động","url":"/tag/bi%E1%BA%BFn-%C4%91%E1%BB%99ng.epi"},{"name":"Tây Nguyên","url":"/tag/T%C3%A2y-Nguy%C3%AAn.epi"},{"name":"cà phê","url":"/tag/c%C3%A0-ph%C3%AA.epi"},{"name":"Arabica","url":"/tag/Arabica.epi"},{"name":"trọng điểm","url":"/tag/tr%E1%BB%8Dng-%C4%91i%E1%BB%83m.epi"},{"name":"đảo chiều","url":"/tag/%C4%91%E1%BA%A3o-chi%E1%BB%81u.epi"},{"name":"cà phê Robusta","url":"/tag/c%C3%A0-ph%C3%AA-Robusta.epi"},{"name":"giao hàng","url":"/tag/giao-h%C3%A0ng.epi"},{"name":"cà phê Arabica","url":"/tag/c%C3%A0-ph%C3%AA-Arabica.epi"},{"name":"Gia Lai","url":"/tag/Gia-Lai.epi"},{"name":"trong nước","url":"/tag/trong-n%C6%B0%E1%BB%9Bc.epi"},{"name":"Đắk Lắk","url":"/tag/%C4%90%E1%BA%AFk-L%E1%BA%AFk.epi"},{"name":"phiên giao dịch","url":"/tag/phi%C3%AAn-giao-d%E1%BB%8Bch.epi"}],"topTags":[{"id":14779,"objectType":13,"name":"Giá cà phê","aliasName":["giá cà phê","Giá cà phê","giá cafe","Giá cafe"],"thumb":"","url":"/gia-ca-phe-tag14779.epi"}],"bodys":[{"type":"image","content":"https://photo-baomoi.bmcdn.me/w700_r1/2026_03_05_578_54613944/06be258074c89d96c4d9.jpg","contentOrigin":"https://photo-baomoi.bmcdn.me/w1000_r1/2026_03_05_578_54613944/06be258074c89d96c4d9.jpg","lazyLoad":false,"width":700,"height":513,"widthOrigin":598,"heightOrigin":439,"originUrl":"https://thoibaotaichinhvietnam.vn/stores/news_dataimages/2026/032026/05/08/in_article/ngay-53-gia-ca-phe-va-ho-tieu-dong-loat-giam-manh-20260305083207.jpg?rt=20260305083208"},{"type":"text","content":"\u003cem\u003eGiá cà phê trong nước hôm nay giao dịch trong khoảng 94.200 - 94.800 đồng/kg. Ảnh tư liệu\u003c/em\u003e","subType":"media-caption"},{"type":"text","content":"\u003cstrong\u003eGiá cà phê giảm mạnh\u003c/strong\u003e"},{"type":"text","content":"\u003ca class=\"tag-link\" href=\"/gia-ca-phe-tag14779.epi\"\u003eGiá cà phê\u003c/a\u003e trong nước hôm nay giảm mạnh từ 1.100 - 1.400 đồng/kg. Hiện giá cà phê nội địa giao dịch trong khoảng 94.200 - 94.800 đồng/kg tại các vùng trọng điểm khu vực Tây Nguyên."},{"type":"text","content":"Cụ thể, giá cà phê Đắk Lắk hôm nay giảm mạnh 1.400 đồng/kg so với ngày hôm qua, đạt mức 94.800 đồng/kg. Tương tự, giá cà phê hôm nay tại tỉnh Gia Lai giao dịch ở mức 94.800 đồng/kg, cũng giảm 1.400 đồng/kg. Gia Lai và Đắk Lắk là 2 địa phương có mức giá cà phê cao nhất trên cả nước hôm nay."},{"type":"text","content":"Trong khi đó, giá cà phê hôm nay tại tỉnh Lâm Đồng hiện giao dịch ở mức 94.200 đồng/kg, giảm đến 1.200 đồng/kg."},{"type":"text","content":"Trên thị trường \u003ca class=\"tag-link\" href=\"/the-gioi.epi\"\u003ethế giới\u003c/a\u003e, giá cà phê tiếp tục đồng loạt tăng trên 2 sàn giao dịch quốc tế. Cụ thể, kết thúc phiên giao dịch gần nhất, giá cà phê Robusta tại London tăng đồng loạt trong các kỳ giao hàng. Trong đó, kỳ giao tháng 1/2026 tăng 29 USD/tấn, đạt mức 3.789 USD/tấn. Hợp đồng giao kỳ hạn tháng 11/2026 cũng tăng nhẹ 30 USD/tấn, lên mức 3.510 USD/tấn."},{"type":"text","content":"Trên sàn New York, giá cà phê Arabica cũng ghi nhận phiên tăng nhẹ trong các kỳ giao hàng. Cụ thể, kỳ giao tháng 3/2026 đảo chiều tăng nhẹ 3,75 cent/lb, đạt mức 290,7 cent/lb. Cùng chiều, hợp đồng giao tháng 12/2026 cũng tăng nhẹ 1,6 cent/lb, đạt mức 270,95 cent/lb."},{"type":"text","content":"Giá cà phê Arabica trên sàn Brazil biến động trái chiều trong các kỳ giao hàng. Cụ thể: kỳ hạn tháng 3/2026 đạt mức 374,2 cent/lb, đảo chiều tăng 4,95 cent/lb so với hôm qua. Trái lại, kỳ giao hàng tháng 5/2026 lại ghi nhận đảo chiều giảm nhẹ 2,7 cent/lb, xuống mức 375,85 cent/lb."},{"type":"text","content":"\u003cstrong\u003eGiá tiêu giảm sâu đến 2.000 đồng/kg\u003c/strong\u003e"},{"type":"text","content":"Giá tiêu trong nước, hôm nay biến động mạnh, sụt giảm sâu đến 2.000 đồng/kg so ngày hôm qua. Hiện giá tiêu trong nước dao động trong khoảng 143.500 - 144.000 đồng/kg."},{"type":"text","content":"Cụ thể, tại Gia Lai, \u003ca class=\"tag-link\" href=\"/gia-ho-tieu-tag14778.epi\"\u003egiá tiêu hôm nay\u003c/a\u003e giao dịch ở mốc 143.500 đồng/kg, giảm mạnh 2.000 đồng/kg. Trong khi đó, giá tiêu hôm nay tại Đắk Lắk, TP. Hồ Chí Minh và Lâm Đồng giao dịch ở mốc 144.000 đồng/kg, đồng loạt giảm mạnh 2.000 đồng/kg."},{"type":"text","content":"Trên thị trường quốc tế, giá tiêu không ghi nhận biến động mới. Các thị trường đều duy trì mức giá ổn định so với phiên giao dịch trước."},{"type":"text","content":"Cụ thể, giá tiêu đen Lampung của Indonesia niêm yết ở mức 6.973 USD/tấn, giảm nhẹ 38 USD/tấn so ngày hôm qua. Tương tự, giá tiêu trắng Muntok cũng giảm đến 50 USD/tấn, hiện đạt mức 9.289 USD/tấn."},{"type":"text","content":"Giá tiêu Brazil hôm nay không thay đổi so với phiên giao dịch ngày hôm qua. Hiện giá giao dịch ở mức 6.175 USD/tấn."},{"type":"text","content":"Tại Malaysia, giá tiêu đen ASTA ổn định ở mức 9.000 USD/tấn; giá tiêu trắng ASTA đạt 12.200 USD/tấn."},{"type":"text","content":"Giá tiêu trắng xuất khẩu của Việt Nam hôm nay không thay đổi, neo cao ở mức 9.350 USD/tấn; giá tiêu đen của Việt Nam loại 500 gr/l đạt mức 6.600 USD/tấn; tiêu đen Việt Nam loại 550 gr/l đạt 6.800 USD/tấn./."},{"type":"text","content":"\u003cstrong\u003eTuấn Anh (tổng hợp)\u003c/strong\u003e","subType":"body-author"}],"images":["https://photo-baomoi.bmcdn.me/w700_r1/2026_03_05_578_54613944/06be258074c89d96c4d9.jpg"],"embedUrl":"","tournamentId":"","isRichFormat":false,"category":{"id":127,"name":"Chứng khoán","url":"/chung-khoan.epi","shortUrl":"chung-khoan"},"forceRedirectUrl":"/ngay-5-3-gia-ca-phe-va-ho-tieu-dong-loat-giam-manh-r54613944.epi","cluster":{"id":10308925,"objectType":5,"name":"#cà phê Robusta","url":"/ca-phe-robusta-t18144022.epi","total":5532},"adBottomTVC":{"zoneId":"BaoMoi_ArticleBottomTVC","id":"BaoMoi_ArticleBottomTVC","elId":"
