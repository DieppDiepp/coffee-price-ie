sau-466072.htm","shareUrl":"/s/c/54588553.epi","publishedDate":1772434800,"totalLike":0,"status":1,"isNoAd":true,"tags":[{"name":"giá cà phê","url":"/tag/gi%C3%A1-c%C3%A0-ph%C3%AA.epi"},{"name":"niên vụ","url":"/tag/ni%C3%AAn-v%E1%BB%A5.epi"},{"name":"tồn kho","url":"/tag/t%E1%BB%93n-kho.epi"},{"name":"cà phê","url":"/tag/c%C3%A0-ph%C3%AA.epi"},{"name":"Arabica","url":"/tag/Arabica.epi"},{"name":"bội thu","url":"/tag/b%E1%BB%99i-thu.epi"},{"name":"đầu cơ","url":"/tag/%C4%91%E1%BA%A7u-c%C6%A1.epi"},{"name":"Hedgepoint Global Markets","url":"/tag/Hedgepoint-Global-Markets.epi"},{"name":"nguồn cung","url":"/tag/ngu%E1%BB%93n-cung.epi"},{"name":"lập kỷ lục","url":"/tag/l%E1%BA%ADp-k%E1%BB%B7-l%E1%BB%A5c.epi"},{"name":"sản lượng","url":"/tag/s%E1%BA%A3n-l%C6%B0%E1%BB%A3ng.epi"},{"name":"ICE","url":"/tag/ICE.epi"},{"name":"toàn cầu","url":"/tag/to%C3%A0n-c%E1%BA%A7u.epi"},{"name":"chưa từng có","url":"/tag/ch%C6%B0a-t%E1%BB%ABng-c%C3%B3.epi"},{"name":"triển vọng","url":"/tag/tri%E1%BB%83n-v%E1%BB%8Dng.epi"},{"name":"Tạp chí Công Thương","url":"/tag/T%E1%BA%A1p-ch%C3%AD-C%C3%B4ng-Th%C6%B0%C6%A1ng.epi"},{"name":"cung kéo","url":"/tag/cung-k%C3%A9o.epi"},{"name":"Brazil","url":"/tag/Brazil.epi"},{"name":"áp lực","url":"/tag/%C3%A1p-l%E1%BB%B1c.epi"},{"name":"ngắn hạn","url":"/tag/ng%E1%BA%AFn-h%E1%BA%A1n.epi"}],"topTags":[{"id":14779,"objectType":13,"name":"Giá cà phê","aliasName":["giá cà phê","Giá cà phê","giá cafe","Giá cafe"],"thumb":"","url":"/gia-ca-phe-tag14779.epi"}],"bodys":[{"type":"text","content":"\u003cstrong\u003eGiá cà phê hôm nay ngày 2/3 tại thị trường trong nước\u003c/strong\u003e"},{"type":"image","content":"https://photo-baomoi.bmcdn.me/w700_r1/2026_03_02_503_54588553/d2cf0ca755efbcb1e5fe.jpg","contentOrigin":"https://photo-baomoi.bmcdn.me/w1000_r1/2026_03_02_503_54588553/d2cf0ca755efbcb1e5fe.jpg","lazyLoad":false,"width":700,"height":214,"widthOrigin":1000,"heightOrigin":307,"originUrl":"https://imgcdn.tapchicongthuong.vn/thumb/w_1000/tcct-media/26/3/2/3_69a507a53bffa.jpg"},{"type":"text","content":"\u003cem\u003eTham khảo giá cà phê hôm nay ngày 3/2/2026 tại thị trường trong nước (Nguồn: Tạp chí Công Thương tổng hợp)\u003c/em\u003e","subType":"media-caption"},{"type":"text","content":"\u003cstrong\u003eGiá cà phê hôm nay\u003c/strong\u003e tại khu vực Tây Nguyên ổn định so với hôm qua. \u003ca class=\"tag-link\" href=\"/gia-ca-phe-tag14779.epi\"\u003eGiá cà phê\u003c/a\u003e trung bình hiện ở quanh mốc 96.000 đồng/kg. Cụ thể:"},{"type":"text","content":"Giá cà phê hôm nay tại tỉnh Đắk Lắk đi ngang hiện đang ở mức 96.000 đồng/kg."},{"type":"text","content":"Tương tự, giá cà phê hôm nay tại tỉnh Lâm Đồng đi ngang hiện đang ở mức 95.500 - 96.000 đồng/kg."},{"type":"text","content":"Giá cà phê hôm nay tại tỉnh Gia Lai đi ngang đạt 96.000 đồng/kg."},{"type":"text","content":"\u003cem\u003eLưu ý: Các mức giá trên chỉ mang tính chất tham khảo, mức giá thực tế sẽ có sự chênh lệch theo từng địa phương, phương thức vận chuyển, phương thức thanh toán, khối lượng giao dịch… Quý độc giả vui lòng liên hệ đến các doanh nghiệp, đại lý \u003ca class=\"tag-link\" href=\"/kinh-doanh.epi\"\u003ekinh doanh\u003c/a\u003e cà phê gần nhất để được tư vấn cụ thể.\u003c/em\u003e"},{"type":"text","content":"\u003cstrong\u003eGiá cà phê hôm nay ngày 2/3/2026 tại thị trường \u003ca class=\"tag-link\" href=\"/the-gioi.epi\"\u003ethế giới\u003c/a\u003e\u003c/strong\u003e"},{"type":"text","content":"Theo dữ liệu mới nhất, tính đến cuối tháng 2, giá cà phê thế giới đồng loạt giảm trên 2 sàn giao dịch lớn so với tháng trước đó. Cụ thể:"},{"type":"text","content":"Trên sàn London, giá cà phê Robusta hợp đồng giao kỳ hạn tháng 3/2026 đạt 3.699 USD/tấn, giảm 10,1% (414 USD/tấn) so với tháng 1 trước đó. Hợp đồng giao kỳ hạn tháng 5/2026 giảm 10,2% (413 USD/tấn), xuống còn 3.624 USD/tấn."},{"type":"text","content":"Trên sàn giao dịch New York, giá cà phê Arabica giao kỳ hạn tháng 3/2025 ghi nhận mức giảm mạnh 14,3% (48 US cent/pound) trong tháng 2 vừa qua, về mốc 284,6 US cent/pound. Hợp đồng giao tháng 5/2026 giảm 11% (35 US cent/pound), đạt 280,75 US cent/pound."},{"type":"text","content":"Thị trường cà phê thế giới đang đứng trước triển vọng dư cung lớn trong niên vụ 2026 - 2027 khi hàng loạt tổ chức tài chính và thương mại đồng loạt đưa ra dự báo sản lượng kỷ lục, đặc biệt từ Brazil, quốc gia xuất khẩu cà phê lớn nhất toàn cầu."},{"type":"text","content":"Theo báo cáo mới công bố của Rabobank, sản lượng cà phê toàn cầu có thể đạt mức cao chưa từng có là 180 triệu bao (60 kg/bao) trong niên vụ 2026 - 2027. Động lực chính đến từ vụ mùa bội thu dự kiến tại Brazil, qua đó đưa cán cân cung - cầu toàn cầu rơi vào trạng thái thặng dư khoảng 7 - 10 triệu bao."},{"type":"text","content":"Rabobank cho rằng triển vọng sản xuất tích cực, cùng với việc lượng tồn kho Arabica được chứng nhận trên sàn ICE gia tăng, là nguyên nhân chủ yếu khiến giá cà phê lao dốc mạnh trong những tuần gần đây. Dữ liệu từ ICE cho thấy tồn kho Arabica tính đến ngày 26/2 đạt 466.055 bao, tăng đáng kể so với mức 449.566 bao của một tuần trước đó. Việc tồn kho phục hồi làm dịu bớt lo ngại thiếu hụt nguồn cung, qua đó tạo áp lực giảm giá trên thị trường kỳ hạn."},{"type":"text","content":"Tuy nhiên, Rabobank cũng lưu ý đà giảm giá vừa qua còn bị khuếch đại bởi hoạt động thanh lý vị thế của các quỹ đầu cơ. Điều này đồng nghĩa thị trường có thể xuất hiện các nhịp điều chỉnh tăng trong ngắn hạn nếu lực bán đầu cơ suy yếu."},{"type":"text","content":"Ở góc nhìn tương tự, Hedgepoint Global Markets cũng đưa ra những con số kỷ lục cho niên vụ 2026 - 2027. Công ty này dự báo xuất khẩu cà phê của Brazil có thể đạt gần 47 triệu bao, vượt mức 42 triệu bao của niên vụ 2025-2026 và cao hơn kỷ lục cũ 46 triệu bao thiết lập năm 2023 - 2024."},{"type":"text","content":"Biên độ dự báo vẫn khá rộng: xuất khẩu Arabica ước đạt 36,7 - 37,8 triệu bao (so với 32,5 triệu bao năm hiện tại), trong khi Robusta dự kiến đạt 8,8 - 9 triệu bao, thấp hơn mức 9,5 triệu bao của niên vụ trước. Tổng sản lượng Brazil được ước tính dao động 71,1 - 74,4 triệu bao, trong đó Arabica chiếm 46,5-49 triệu bao và Robusta 24,6 - 25,4 triệu bao."},{"type":"text","content":"Trên phạm vi toàn cầu, Hedgepoint dự báo sản lượng niên vụ 2026 - 2027 có thể đạt 188 triệu bao, vượt xa nhu cầu khoảng 181 triệu bao. Khoảng chênh lệch đáng kể này sẽ tạo điều kiện để các nước nhập khẩu tái thiết lập tồn kho sau giai đoạn sụt giảm mạnh, song đồng thời đặt thị trường trước áp lực dư cung kéo dài nếu nhu cầu không tăng tương ứng."},{"type":"text","content":"\u003cstrong\u003e Đạt Trịnh \u003c/strong\u003e","subType":"body-author"}],"images":["https://photo-baomoi.bmcdn.me/w700_r1/2026_03_02_503_54588553/d2cf0ca755efbcb1e5fe.jpg"],"embedUrl":"","tournamentId":"","isRichFormat":false,"category":{"id":127,"name":"Chứng khoán","url":"/chung-khoan.epi","shortUrl":"chung-khoan"},"forceRedirectUrl":"/gia-ca-phe-hom-nay-2-3-nguon-cung-ca-phe-toan-cau-lap-ky-luc-gia-doi-mat-ap-luc-giam-sau-r54588553.epi","cluster":{"id":36880020,"objectType":5,"name":"#Arabica","url":"/arabica-t18144022.epi","total":1927},"adBottomTVC":{"zoneId":"BaoMoi_ArticleBottomTVC","id":"BaoMoi_ArticleBottomTVC","elId":"BaoMoi_ArticleBottomTVC","type":"adNative"}},"sidebar":[{"sectionId":160,"url":"/app/get/sidebar","params":{"categoryId":45,"sectionIds":"119,102,115,104,121","pageType":0}}],"pageUrl":"/gia-ca-phe-hom-nay-2-3-nguon-cung-ca-phe-toan-cau-lap-ky-luc-gia-doi-mat-ap-luc-giam-sau-r54588553.epi","checkPageUrl":true,"preloadImageUrl":"https://photo-baomoi.bmcdn.me/w700_r1/2026_03_02_503_54588553/d2cf0ca755efbcb1e5fe.jpg","title":"Giá cà phê hôm nay 2/3: Nguồn cung cà phê toàn cầu lập kỷ lục, giá đối mặt áp lực giảm sâu"},"version":"v.0.4.78","timestamp":1773653834742},"userAgent":"mozilla/5.0 (windows nt 10.0; win64; x64)","isBot":false,"hostName":"baomoi.com","isRedirectPage":true,"isBlankLayout":true},"__N_SSP":true},"page":"/content/redirect/[id]","query":{"id":"54588553"},"buildId":"80S9FUGKgR9d
