an","url":"/tag/c%C6%A1-quan-h%E1%BA%A3i-quan.epi"},{"name":"dè dặt","url":"/tag/d%C3%A8-d%E1%BA%B7t.epi"},{"name":"bán tháo","url":"/tag/b%C3%A1n-th%C3%A1o.epi"},{"name":"doanh nghiệp xuất khẩu","url":"/tag/doanh-nghi%E1%BB%87p-xu%E1%BA%A5t-kh%E1%BA%A9u.epi"},{"name":"rơi","url":"/tag/r%C6%A1i.epi"},{"name":"Đăk Nông","url":"/tag/%C4%90%C4%83k-N%C3%B4ng.epi"},{"name":"theo sát","url":"/tag/theo-s%C3%A1t.epi"},{"name":"tăng giảm","url":"/tag/t%C4%83ng-gi%E1%BA%A3m.epi"},{"name":"thị trường trong nước","url":"/tag/th%E1%BB%8B-tr%C6%B0%E1%BB%9Dng-trong-n%C6%B0%E1%BB%9Bc.epi"},{"name":"nối tiếp","url":"/tag/n%E1%BB%91i-ti%E1%BA%BFp.epi"}],"topTags":[{"id":14779,"objectType":13,"name":"Giá cà phê","aliasName":["giá cà phê","Giá cà phê","giá cafe","Giá cafe"],"thumb":"","url":"/gia-ca-phe-tag14779.epi"}],"bodys":[{"type":"text","content":"Tại Đắk Nông (cũ), Đắk Lắk và Gia Lai, \u003ca class=\"tag-link\" href=\"/gia-ca-phe-tag14779.epi\"\u003egiá cà phê\u003c/a\u003e cùng giảm 500 đồng/kg, hiện ở mức 95.500 đồng/kg. Giá cà phê tại Lâm Đồng giảm 700 đồng/kg, xuống còn 94.800 đồng/kg."},{"type":"text","content":"Nếu tính từ đầu tháng 2 đến nay, giá cà phê nội địa đã giảm hơn 5%, tương ứng 5.200 – 5.400 đồng/kg. Dù vậy, mặt bằng hiện tại vẫn cao hơn đáng kể so với trung bình nhiều năm trước, giúp người trồng duy trì lợi nhuận nhất định."},{"type":"text","content":"Thị trường trong nước hiện nay mua bán khá dè dặt. Nông dân chưa bán tháo ồ ạt, trong khi doanh nghiệp xuất khẩu theo sát diễn biến sàn kỳ hạn để điều chỉnh chiến lược mua vào."},{"type":"image","content":"https://photo-baomoi.bmcdn.me/w700_r1/2026_03_03_594_54594360/e83de891b3d95a8703c8.jpg","contentOrigin":"https://photo-baomoi.bmcdn.me/w1000_r1/2026_03_03_594_54594360/e83de891b3d95a8703c8.jpg","lazyLoad":false,"width":700,"height":367,"widthOrigin":1200,"heightOrigin":630,"originUrl":"https://media.vnbusiness.vn/files/uploads/2026/03/03/ddd06d423de74035acc77e7f8e34a29d-5289.png?w=1200"},{"type":"text","content":"\u003cem\u003eGiá cà phê giảm ở các vùng trồng trọng điểm.\u003c/em\u003e","subType":"media-caption"},{"type":"text","content":"Theo thống kê của cơ quan hải quan, tính đến ngày 15/2, Việt Nam đã xuất khẩu gần 319.000 tấn cà phê, thu về 1,53 tỷ USD, tăng 44,1% về lượng và 25,7% về trị giá so với cùng kỳ năm trước."},{"type":"text","content":"Những con số này cho thấy nhu cầu từ các thị trường tiêu thụ lớn vẫn duy trì ở mức cao, đồng thời nối tiếp đà tăng trưởng của năm 2025. Đây được xem là cơ sở quan trọng giúp thị trường nội địa không rơi vào trạng thái giảm sâu."},{"type":"text","content":"Trong thời gian tới, giá cà phê nhiều khả năng chịu áp lực từ tồn kho tăng và kỳ vọng vụ mùa Brazil thuận lợi. Thị trường vẫn tiềm ẩn nhiều biến số như diễn biến \u003ca class=\"tag-link\" href=\"/tien-ich-ty-gia-ngoai-te.epi\"\u003etỷ giá\u003c/a\u003e, điều kiện thời tiết trong giai đoạn quyết định của niên vụ Brazil và dòng vốn đầu cơ trên các sàn kỳ hạn."},{"type":"text","content":"Trong ngắn hạn, giá cà phê nội địa có thể tiếp tục dao động mạnh quanh các vùng hỗ trợ kỹ thuật, khi thị trường bước vào giai đoạn nhạy cảm trước mọi thông tin về sản lượng, tồn kho toàn cầu."},{"type":"text","content":"Đặc biệt, cà phê Việt Nam với 80-90% là phục vụ xuất khẩu, chỉ 15-20% tiêu thụ nội địa nên giá \u003ca class=\"tag-link\" href=\"/the-gioi.epi\"\u003ethế giới\u003c/a\u003e thường tác động."},{"type":"text","content":"Trên thế giới, tại sàn London, giá cà phê đồng loạt tăng. Hợp đồng kỳ hạn giao tháng 3/2026 hiện ở mức 3.842 USD/tấn, tăng 3.87%. Các kỳ hạn hợp đồng giao tháng 5/2026-9/2026 ở mức 3.510-3.772 USD/tấn."},{"type":"text","content":"Giá cà phê Arabica tăng giảm trái chiều. Kỳ hạn hợp đồng tháng 3/2026 giảm 0.48% và hiện ở mức 284.60 cent/lb. Các kỳ hạn từ tháng 5/2026 -12/2026 hôm nay đều tăng từ 1.01%-1.10% và dao động ở mức 269.60 – 283.60 cent/lb."},{"type":"text","content":"\u003cstrong\u003eNhư Yến\u003c/strong\u003e","subType":"body-author"}],"images":["https://p
