m-dinh-2-tuan-do-chi-phi-van-chuyen--260303052254430.html","shareUrl":"/s/c/54593415.epi","publishedDate":1772493960,"totalLike":0,"status":1,"isNoAd":false,"tags":[{"name":"Robusta","url":"/tag/Robusta.epi"},{"name":"giá cà phê","url":"/tag/gi%C3%A1-c%C3%A0-ph%C3%AA.epi"},{"name":"eo biển Hormuz","url":"/tag/eo-bi%E1%BB%83n-Hormuz.epi"},{"name":"ICO","url":"/tag/ICO.epi"},{"name":"Arabica","url":"/tag/Arabica.epi"},{"name":"rang","url":"/tag/rang.epi"},{"name":"tăng mạnh","url":"/tag/t%C4%83ng-m%E1%BA%A1nh.epi"},{"name":"xay","url":"/tag/xay.epi"},{"name":"lên cao","url":"/tag/l%C3%AAn-cao.epi"},{"name":"đình trệ","url":"/tag/%C4%91%C3%ACnh-tr%E1%BB%87.epi"},{"name":"cước","url":"/tag/c%C6%B0%E1%BB%9Bc.epi"},{"name":"cà phê robusta Sumatra","url":"/tag/c%C3%A0-ph%C3%AA-robusta-Sumatra.epi"},{"name":"cà phê","url":"/tag/c%C3%A0-ph%C3%AA.epi"},{"name":"Somar Meteorologia","url":"/tag/Somar-Meteorologia.epi"},{"name":"vận chuyển","url":"/tag/v%E1%BA%ADn-chuy%E1%BB%83n.epi"},{"name":"đỉnh","url":"/tag/%C4%91%E1%BB%89nh.epi"},{"name":"Conab","url":"/tag/Conab.epi"},{"name":"vận tải","url":"/tag/v%E1%BA%ADn-t%E1%BA%A3i.epi"},{"name":"chạm","url":"/tag/ch%E1%BA%A1m.epi"},{"name":"Minas Gerais","url":"/tag/Minas-Gerais.epi"}],"bodys":[{"type":"image","content":"https://photo-baomoi.bmcdn.me/w700_r1/2026_03_03_442_54593415/97d39327c86f2131787e.jpg","contentOrigin":"https://photo-baomoi.bmcdn.me/w1000_r1/2026_03_03_442_54593415/97d39327c86f2131787e.jpg","lazyLoad":false,"width":700,"height":527,"widthOrigin":758,"heightOrigin":571,"originUrl":"https://cdncongthuong.quangtrung.vn/static_files/huuthanh/images/2026/03/03/brazildarkish1_11zon-b2e4.jpg"},{"type":"text","content":"Trên sàn London, \u003ca class=\"tag-link\" href=\"/gia-ca-phe-tag14779.epi\"\u003egiá cà phê robusta\u003c/a\u003e kỳ hạn giao tháng 3/2026 tăng mạnh 143 USD/tấn (+3,87%) lên 3.842 USD/tấn. Tương tự, hợp đồng giao tháng 5/2026 giá tăng 148 USD/tấn (+4,08%) lên 3.772 USD/tấn, kỳ hạn giao tháng 7/2026 giá tăng 124 USD/tấn (+3,49%) lên 3.676 USD/tấn. Các kỳ hạn khác giá cũng tăng 55-101 USD/tấn."},{"type":"text","content":"Trên sàn New York, giá cà phê arabica giao tháng 3/2026 tăng 3,75 US cent/pound (+1,32%) lên 288,35 US cent/pound. Tương tự, giá cà phê giao tháng 5/2026 giá tăng 3,85 US cent/pound (+1,37%) lên 3,85 US cent/pound, kỳ hạn giao tháng 7/2026, giá tăng 3,8 US cent/pound lên 279,7 US cent/pound. Các kỳ hạn khác giá cũng tăng 3,7-3,9 US cent/pound."},{"type":"text","content":"Theo \u003cem\u003eBarchart\u003c/em\u003e, giá cà phê tăng mạnh với robusta lên cao nhất 2 tuần chủ yếu do lo ngại về cuộc xung đột tại Iran làm đình trệ phần lớn hoạt động vận chuyển qua eo biển Hormuz, đẩy cước vận tải toàn cầu, chi phí bảo hiểm cũng như nhiên liệu tăng cao, làm tăng chi phí đối với các nhà nhập khẩu và rang xay cà phê."},{"type":"text","content":"Tuy nhiên, đà tăng của arabica trong ngày thứ Hai phần nào bị hạn chế khi lượng mưa thuận lợi tại Brazil đã cải thiện triển vọng vụ cà phê của nước này."},{"type":"text","content":"Somar Meteorologia hôm thứ Hai cho biết, khu vực trồng arabica lớn nhất Brazil là Minas Gerais nhận được lượng mưa 78 mm trong tuần kết thúc ngày 20/2, tương đương 131% mức trung bình lịch sử."},{"type":"text","content":"Giá cà phê đã giảm mạnh trong 5 tuần qua, với arabica rơi xuống mức thấp nhất trong 15 tháng vào thứ Ba tuần trước và robusta lao dốc xuống mức thấp nhất trong 6,75 tháng vào thứ Hai tuần trước, khi các dấu hiệu về một vụ cà phê bội thu tại Brazil đã cải thiện triển vọng nguồn cung toàn cầu."},{"type":"text","content":"Ngày 5/2, Conab cơ quan dự báo mùa vụ của Brazil cho biết sản lượng cà phê Brazil năm 2026 sẽ tăng 17,2% so với cùng kỳ lên mức kỷ lục 66,2 triệu bao, trong đó sản lượng arabica tăng 23,2% lên 44,1 triệu bao và robusta tăng 6,3% lên 22,1 triệu bao. Trong khi đó, hôm thứ Tư tuần trước, Rabobank cho biết sản lượng cà phê toàn cầu được dự báo đạt mức kỷ lục 180 triệu bao trong niên vụ 2026/27, tăng khoảng 8 triệu bao so với một năm trước."},{"type":"text","content":"\u003cem\u003eReuters\u003c/em\u003e dẫn số liệu của cơ quan thương mại địa phương Indonesia công bố hôm thứ Hai cho biết, lượng xuất khẩu hạt cà phê robusta Sumatra của Indonesia trong tháng 1/2026 đạt 18.788,1 tấn, tăng 1,62% so với cùng kỳ năm ngoái, nhưng giảm 42,3% so với mức 32.537,5 tấn tháng 12/2025."},{"type":"text","content":"Trong một diễn biến khác, hôm 26/2 vừa qua, Tổ chức Cà phê Quốc tế (ICO) đã khởi động một chiến dịch truyền thông toàn cầu cho năm 2026 với tên gọi \"Cà phê là một phần của giải pháp\" nhằm định vị cà phê như một công cụ thúc đẩy phát triển kinh tế - xã hội và tăng cường sự hợp tác. Theo ICO, chiến dịch này sẽ diễn ra xuyên suốt năm 2026 trên các nền tảng kỹ thuật số của tổ chức, với sự hỗ trợ từ các video, dữ liệu phân tích chuyên sâu cùng sự tham gia của các thành viên và đối tác."},{"type":"text","content":"Mặc dù chiến dịch \"Cà phê là một phần của giải pháp\" không chỉ đích danh \"vấn đề\" là gì, nhưng ngành cà phê nhân xanh toàn cầu vẫn đang tiếp tục phụ thuộc vào hàng triệu hộ nông dân nhỏ lẻ - những người đang phải đối mặt với các mối đe dọa như nghèo đói, biến đổi khí hậu, sự thiếu hụt các nguồn lực kỹ thuật và thị trường, cùng nhiều thách thức khác. Cà phê cũng từng bị xác định là một tác nhân gây ra nạn phá rừng và đóng góp vào lượng phát thải khí nhà kính thông qua các hoạt động vận tải đường biển quốc tế, vận chuyển nội địa, rang xay, vận hành quán cà phê và các hoạt động tiêu tốn nhiều nguồn lực khác trong suốt hành trình từ hạt giống đến tách cà phê."},{"type":"text","content":"ICO khẳng định rằng cà phê không chỉ đóng góp vào thu nhập của nông dân và nguồn thu xuất khẩu, mà còn hỗ trợ phát triển nông thôn, cô lập carbon (carbon sequestration) và tính bền vững của môi trường, bảo tồn di sản văn hóa và thắt chặt mối quan hệ giữa các quốc gia sản xuất và tiêu thụ, cùng nhiều lợi ích khác. Chiến dịch nhằm mục đích làm nổi bật những đóng góp đó, đồng thời khuyến khích \"hành động tập thể trên toàn chuỗi giá trị\"."},{"type":"text","content":"Ngành cà phê hiện đang cung cấp thu nhập cho khoảng 12,5 triệu hộ gia đình nông dân trên toàn \u003ca class=\"tag-link\" href=\"/the-gioi.epi\"\u003ethế giới\u003c/a\u003e và đóng vai trò trung tâm trong việc định hình sự phát triển kinh tế - xã hội tại các vùng sản xuất. Trong suốt năm 2026, Tổ chức Cà phê Quốc tế (ICO) sẽ trình diễn các dự án, sáng kiến và kết quả thực tế nhằm chứng minh rằng sự hợp tác giữa những người sản xuất, chính phủ, khu vực tư nhân, các tổ chức tài chính và xã hội dân sự có thể chuyển hóa các chiến lược thành những kết quả hữu hình."},{"type":"text","content":"\u003cstrong\u003eQuang Trung\u003c/strong\u003e","subType":"body-author"}],"images":["https://photo-baomoi.bmcdn.me/w700_r1/2026_03_03_442_54593415/97d39327c86f2131787e.jpg"],"embedUrl":"","tournamentId":"","isRichFormat":false,"category":{"id":45,"name":"Kinh tế","url":"/kinh-te.epi","shortUrl":"kinh-te"},"forceRedirectUrl":"/gia-ca-phe-hom-nay-3-3-tang-manh-robusta-cham-dinh-2-tuan-do-chi-phi-van-chuyen-len-cao-r54593415.epi","cluster":{"id":18144022,"objectType":5,"name":"#robusta","url":"/robusta-t18144022.epi","total":6690},"adBottomTVC":{"zoneId":"BaoMoi_ArticleBottomTVC","id":"BaoMoi_ArticleBottomTVC","elId":"BaoMoi_ArticleBottomTVC","type":"adNative"},"adBottomContent":["BaoMoi_Ariticle_Image"]},"sidebar":[{"sectionId":160,"url":"/app/get/sidebar","params":{"categoryId":45,"sectionIds":"119,102,115,104,121","pageType":0}}],"pageUrl":"/gia-ca-phe-hom-nay-3-3-tang-manh-robusta-cham-dinh-2-tuan-do-chi-phi-van-chuyen-len-cao-r54593415.epi","checkPageUrl":true,"preloadImageUrl":"https://photo-baomoi.bmcdn.me/w700_r1/2026_03_03_442_54593415/97d39327c86f2131787e.jpg","title":"Giá cà phê hôm nay 3/3: Tăng mạnh, robusta chạm đỉnh 2 tuần do chi phí vận chuyển lên cao","adMasthead":{"elId":"BaoMoi_Masthead","zoneId":"2006008566803555488","zoneAdaptive":"","adtimaConfig":{}}},"version":"v.0.4.78","timestamp":17735
