u003c/strong\u003e"},{"type":"text","content":"Cập nhật tại các địa phương trọng điểm:"},{"type":"text","content":"Đắk Lắk: 95.500 đồng/kg (giảm 500 đồng/kg)"},{"type":"text","content":"Lâm Đồng: 94.800 đồng/kg (giảm 700 đồng/kg)"},{"type":"text","content":"Gia Lai: 95.500 đồng/kg (giảm 500 đồng/kg)"},{"type":"text","content":"Đắk Nông (Lâm Đồng mới): 95.500 đồng/kg (giảm 500 đồng/kg)"},{"type":"text","content":"Lâm Đồng tiếp tục là địa phương có mức giá thấp nhất khu vực. Các tỉnh còn lại giữ chung mốc 95.500 đồng/kg sau khi điều chỉnh giảm."},{"type":"text","content":"\u003cstrong\u003eThị trường thế giới gây áp lực\u003c/strong\u003e"},{"type":"text","content":"Trên thị trường quốc tế, giá cà phê Robusta và Arabica biến động theo xu hướng điều chỉnh kỹ thuật sau chuỗi tăng trước đó. Đồng USD duy trì ở mức cao và lực bán chốt lời gia tăng khiến thị trường thận trọng hơn trong những phiên đầu tháng 3."},{"type":"text","content":"Diễn biến này tác động trực tiếp đến thị trường nội địa Việt Nam, khi doanh nghiệp xuất khẩu điều chỉnh giá thu mua theo biến động sàn quốc tế."},{"type":"text","content":"\u003cstrong\u003eDự báo ngắn hạn\u003c/strong\u003e"},{"type":"text","content":"Trong ngắn hạn, giá cà phê trong nước có thể tiếp tục dao động trong vùng 94.500 – 96.000 đồng/kg. Nếu thị trường thế giới ổn định trở lại, khả năng phục hồi lên mốc 96.000 đồng/kg vẫn được kỳ vọng."},{"type":"image","content":"https://photo-baomoi.bmcdn.me/w700_r1/2026_03_03_125_54593732/df7411b94af1a3affae0.jpg","contentOrigin":"https://photo-baomoi.bmcdn.me/w1000_r1/2026_03_03_125_54593732/df7411b94af1a3affae0.jpg","lazyLoad":true,"width":700,"height":1269,"widthOrigin":522,"heightOrigin":947,"originUrl":"https://media.baovanhoa.vn/zoom/1000/uploaded/hungnv/2026_03_03/gia_caphe_3-3_zcwy.jpg"},{"type":"text","content":"\u003cstrong\u003eHÙNG NGUYỄN\u003c/strong\u003e","subType":"body-author"}],"images":["https://photo-baomoi.bmcdn.me/w700_r1/2026_03_03_125_54593732/b9c6720b2943c01d9952.jpg"
