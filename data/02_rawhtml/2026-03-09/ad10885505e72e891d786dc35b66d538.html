name":"thời gian giao hàng","url":"/tag/th%E1%BB%9Di-gian-giao-h%C3%A0ng.epi"},{"name":"Arabica","url":"/tag/Arabica.epi"},{"name":"mốc","url":"/tag/m%E1%BB%91c.epi"},{"name":"chào mua","url":"/tag/ch%C3%A0o-mua.epi"},{"name":"cà phê Robusta","url":"/tag/c%C3%A0-ph%C3%AA-Robusta.epi"},{"name":"địa chính trị","url":"/tag/%C4%91%E1%BB%8Ba-ch%C3%ADnh-tr%E1%BB%8B.epi"},{"name":"cà phê Arabica","url":"/tag/c%C3%A0-ph%C3%AA-Arabica.epi"},{"name":"tàu biển","url":"/tag/t%C3%A0u-bi%E1%BB%83n.epi"},{"name":"thu mua","url":"/tag/thu-mua.epi"},{"name":"dao động","url":"/tag/dao-%C4%91%E1%BB%99ng.epi"},{"name":"kỳ hạn","url":"/tag/k%E1%BB%B3-h%E1%BA%A1n.epi"}],"bodys":[{"type":"text","content":"Tại Đắk Nông (cũ), \u003ca class=\"tag-link\" href=\"/gia-ca-phe-tag14779.epi\"\u003egiá cà phê\u003c/a\u003e vẫn được thu mua cao nhất khu vực, đạt 96.700 đồng/kg."},{"type":"text","content":"Tại Đắk Lắk và Gia Lai, giá cà phê được giao dịch ở mức 96.500 đồng/kg. Trong khi đó, giá cà phê tại Lâm Đồng khoảng 96.300 đồng/kg, thấp nhất khu vực."},{"type":"text","content":"Cà phê \u003ca class=\"tag-link\" href=\"/the-gioi.epi\"\u003ethế giới\u003c/a\u003e giảm trong khi giá cà phê trong nước vẫn giữ ổn định. Hiện, nguồn hàng trong dân còn ít đã tạo ra sự cạnh tranh thu mua giữa các doanh nghiệp nội địa và các tập đoàn FDI lớn. Chính vì vậy, dù không tăng nhưng nhìn chung, mặt bằng giá cà phê trong nước cao hơn đáng kể so với kỳ vọng đầu vụ."},{"type":"image","content":"https://photo-baomoi.bmcdn.me/w700_r1/2026_03_11_594_54660513/2d1cbbf9feb117ef4ea0.jpg","contentOrigin":"https://photo-baomoi.bmcdn.me/w1000_r1/2026_03_11_594_54660513/2d1cbbf9feb117ef4ea0.jpg","lazyLoad":false,"width":700,"height":367,"widthOrigin":1200,"heightOrigin":630,"originUrl":"https://media.vnbusiness.vn/files/uploads/2026/03/11/8d495ab2b0c44776b8f5cf3bbbf298b5-5698.jpg?w=1200"},{"type":"text","content":"\u003cem\u003eGiá cà phê hôm nay (11/3) giữ ổn định tại khu vực Tây Nguyên.\u003c/em\u003e","subType":"media-caption"},{"type":"text","content":"Việc giá cà phê trong nước vẫn giữ ổn định trong khi trên sàn quốc tế giảm được cho là do yếu tố cung cầu, tình trạng đứt gãy chuỗi cung ứng tại khu vực Trung Đông tiếp tục là rào cản lớn đối với hoạt động xuất khẩu nông sản."},{"type":"text","content":"Những căng thẳng địa chính trị và rủi ro vận tải tại eo biển Hormuz khiến cước tàu biển sang thị trường châu Âu neo ở mức cao chưa từng có. Việc thay đổi lộ trình vận chuyển không chỉ kéo dài thời gian giao hàng thêm 15 ngày mà còn trực tiếp đẩy chi phí bảo hiểm hàng hải lên cao, buộc các nhà nhập khẩu quốc tế phải chấp nhận mức giá chào mua tại thị trường nội địa Việt Nam để đảm bảo lượng nguyên liệu dự trữ an toàn cho các kế hoạch sản xuất dài hạn."},{"type":"text","content":"Trên thế giới, giá cà phê robusta hợp đồng giao kỳ hạn tháng 5/2026 trên sàn London giảm mạnh 2,08% (79 USD/tấn) so với phiên giao dịch trước, xuống còn 3.692 USD/tấn. Hợp đồng giao kỳ hạn tháng 7/2026 giảm 1,95% (72 USD/tấn), đạt 3.596 USD/tấn."},{"type":"text","content":"Trên sàn giao dịch New York, giá cà phê arabica giao kỳ hạn tháng 5/2026 giảm nhẹ 0,36% (1,1 US cent/pound), đạt 295,8 US cent/pound. Hợp đồng giao tháng 7/2026 giảm 0,27% (0,8 US cent/pound), đạt 290,1 US cent/pound."},{"type":"text","content":"Giá cà phê giảm trong phiên vừa qua do áp lực bán chốt lời từ các vị thế mua sau đợt tăng giá diễn ra trong khoảng 1 tuần rưỡi vừa qua."},{"type":"text","content":"Chủ tịch Cecafé, ông Márcio Ferreira, cho biết sự sụt giảm xuất khẩu chủ yếu do cà phê arabica, khi giá của loại cà phê này trên sàn New York đã trải qua một đợt giảm mạnh và nhanh."},{"type":"text","content":"Ông cũng cho biết thêm rằng đồng USD yếu hơn so với đồng real Brazil và việc nông dân có nguồn tài chính tốt đã làm giảm khả năng cạnh tranh xuất khẩu của Brazil."},{"type":"text","content":"Trong khi đó, theo Comunicaffe, tình hình địa chính trị một lần nữa gây xáo trộn thị trường cà phê, làm phức tạp thêm bức tranh vốn chỉ vài tuần trước đây vẫn đầy lạc quan, với sản lượng phục hồi, tiêu thụ ổn định và triển vọng nguồn cung dư thừa lớn cho niên vụ cà phê tiếp theo."},{"type":"text","content":"\u003cstrong\u003eNhư Yến \u003c/strong\u003e","subType":"body-author"}],"images":["https://photo-baomoi.bmcdn.me/w700_r1/2026_03_11_594_54660513/2d1cbbf9feb117ef4ea0.jpg"],"embedUrl":"","tournamentId":"","isRichFormat":false,"category":{"id":45,"name":"Kinh tế","url":"/kinh-te.epi","shortUrl":"kinh-te"},"forceRedirectUrl":"/san-quoc-te-do-lua-gia-ca-phe-noi-dia-van-giu-vung-moc-96-700-dong-kg-r54660513.epi","cluster":{"id":36880020,"objectType":5,"name":"#Arabica","url":"/arabica-t18144022.epi","total":1921},"adBottomTVC":{"zoneId":"BaoMoi_ArticleBottomTVC","id":"BaoMoi_ArticleBottomTVC","elId":"BaoMoi_ArticleBottomTVC","type":"adNative"}},"sidebar":[{"sectionId":160,"url":"/app/get/sidebar","params":{"categoryId":45,"sectionIds":"119,102,115,104,121","pageType":0}}],"pageUrl":"/san-quoc-te-do-lua-gia-ca-phe-noi-dia-van-giu-vung-moc-96-700-dong-kg-r54660513.epi","checkPageUrl":true,"preloadImageUrl":"https://photo-baomoi.bmcdn.me/w700_r1/2026_03_11_594_54660513/2d1cbbf9feb117ef4ea0.jpg","title":"Sàn quốc tế 'đỏ lửa', giá cà phê nội địa vẫn giữ vững mốc 96.700 đồng/kg"},"version":"v.0.4.78","timestamp":1773584746863},"userAgent":"mozilla/5.0 (windows nt 10.0; win64; x64)","isBot":false,"hostName":"baomoi.com","isRedirectPage":true,"isBlankLayout":true},"__N_SSP":true},"page":"/content/redirect/[id]","query":{"id":"54660513"},"buildId":"JWfAJyCY0tcMOsQhfz167","assetPrefix":"https://baomoi-static.bmcdn.me/web-v2/prod/v0.7.75","isFallback":false,"gssp":true,"scriptLoader":[]}</script></body></html>
