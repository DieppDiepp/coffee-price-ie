nay phục hồi, tăng nhẹ từ 500 - 700 đồng/kg. Hiện giá cà phê nội địa giao dịch trong khoảng 95.300 - 96.200 đồng/kg tại các vùng trọng điểm khu vực Tây Nguyên."},{"type":"text","content":"Cụ thể, giá cà phê Đắk Lắk tăng nhẹ 700 đồng/kg, đạt mức 96.200 đồng/kg. Tương tự, giá cà phê tại tỉnh Gia Lai giao dịch ở mức 96.200 đồng/kg, cũng tăng nhẹ 700 đồng/kg. Gia Lai và Đắk Lắk là 2 địa phương có mức giá cà phê cao nhất trên cả nước hôm nay. Trong khi đó, giá cà phê hôm nay tại tỉnh Lâm Đồng hiện giao dịch ở mức 95.300 đồng/kg, tăng 500 đồng/kg."},{"type":"text","content":"Trên thị trường \u003ca class=\"tag-link\" href=\"/the-gioi.epi\"\u003ethế giới\u003c/a\u003e, giá cà phê đảo chiều giảm đồng loạt trên 2 sàn giao dịch quốc tế. Cụ thể, giá cà phê Robusta tại London giảm nhẹ đồng loạt trong các kỳ giao hàng. Trong đó, kỳ giao tháng 1/2026 giảm mạnh 82 USD/tấn, đạt mức 3.760 USD/tấn. Hợp đồng giao kỳ hạn tháng 11/2026 cũng giảm nhẹ 30 USD/tấn, xuống mức 3.480 USD/tấn."},{"type":"text","content":"Trên sàn New York, giá cà phê Arabica cũng ghi nhận phiên giảm nhẹ trong các kỳ giao hàng. Cụ thể, kỳ giao tháng 3/2026 đảo chiều giảm nhẹ 1,4 cent/lb, đạt mức 286,95 cent/lb. Cùng chiều, hợp đồng giao tháng 12/2026 cũng giảm nhẹ 1,25 cent/lb, đạt mức 269,35 cent/lb."},{"type":"text","content":"Kết thúc phiên giao dịch gần nhất, giá cà phê Arabica trên sàn Brazil tiếp tục ghi nhận phiên biến động trái chiều trong các kỳ giao hàng. Cụ thể: kỳ hạn tháng 3/2026 đạt mức 369,25 cent/lb, đảo chiều giảm 1,85 cent/lb so với hôm qua. Trái lại, kỳ giao hàng tháng 9/2026 lại ghi nhận tăng nhẹ 0,55 cent/lb, lên mức 338,6 cent/lb."},{"type":"text","content":"\u003cstrong\u003eGiá tiêu đi ngang\u003c/strong\u003e"},{"type":"text","content":"Giá tiêu trong nước hôm nay không biến động sau phiên sụt giảm sâu ngày hôm qua. Hiện giá tiêu trong nước dao động trong khoảng 145.000 - 146.000 đồng/kg."},{"type":"text","content":"Cụ thể, tại Gia Lai, \u003ca class=\"tag-link\" href=\"/gia-ho-tieu-tag14778.epi\"\u003egiá tiêu hôm nay\u003c/a\u003e giao dịch ở mốc 145.500 đồng/kg.Tương tự, giá tiêu tại Đắk Lắk, TP. Hồ Chí Minh và Lâm Đồng giao dịch ở mốc 146.000 đồng/kg. Tại Đồng Nai, giá tiêu giao dịch ở mức 145.000 đồng/kg."},{"type":"text","content":"Trên thị trường quốc tế, giá tiêu xuất khẩu ghi nhận biến động mới từ thị trường Indonesia. Các thị trường khác đều duy trì mức giá ổn định so với phiên giao dịch trước."},{"type":"text","content":"Cụ thể, giá tiêu đen Lampung của Indonesia niêm yết ở mức 6.973 USD/tấn, giảm nhẹ 38 USD/tấn so ngày hôm qua. Tương tự, giá tiêu trắng Muntok cũng giảm đến 50 USD/tấn, hiện đạt mức 9.289 USD/tấn."},{"type":"text","content":"Giá tiêu Brazil hôm nay không thay đổi so với phiên giao dịch ngày hôm qua. Hiện giá giao dịch ở mức 6.175 USD/tấn."},{"type":"text","content":"Tại Malaysia, giá tiêu đen ASTA ổn định ở mức 9.000 USD/tấn; giá tiêu trắng ASTA đạt 12.200 USD/tấn."},{"type":"text","content":"Giá tiêu trắng xuất khẩu của Việt Nam hôm nay không thay đổi, neo cao ở mức 9.350 USD/tấn; giá tiêu đen của Việt Nam loại 500 gr/l đạt mức 6.600 USD/tấn; tiêu đen Việt Nam loại 550 gr/l đạt 6.800 USD/tấn./."},{"type":"text","content":"\u003cstrong\u003eTuấn Anh (tổng hợp)\u003c/strong\u003e","subType":"body-author"}],"images":["https://photo-baomoi.bmcdn.me/w700_r1/2026_03_04_578_54605210/9f0aba34eb7c02225b6d.jpg"],"embedUrl":"","tournamentId":"","isRichFormat":false,"category":{"id":127,"name":"Chứng khoán","url":"/chung-khoan.epi","shortUrl":"chung-khoan"},"forceRedirectUrl":"/ngay-4-3-gia-ca-phe-quay-dau-tang-ho-tieu-di-ngang-r54605210.epi","cluster":{"id":10308925,"objectType":5,"name":"#cà phê Robusta","url":"/ca-phe-robusta-t18144022.epi","total":5532},"adBottomTVC":{"zoneId":"BaoMoi_ArticleBottomTVC","id":"BaoMoi_ArticleBottomTVC","elId":"BaoMoi_ArticleBottomTVC","type":"adNative"},"adBottomContent":["BaoMoi_Ariticle_Image"]},"sidebar":[{"sectionId":160,"url":"/app/get/sidebar","params":{"categoryId":45,"sectionIds":"119,102,1
