ễn biến trồi sụt liên tiếp trong những phiên gần đây cho thấy cung - cầu vẫn đang trong trạng thái giằng co. Mặt bằng giá nội địa hiện lùi về vùng 147.500 - 148.000 đồng/kg,","originalUrl":"https://thoibaotaichinhvietnam.vn/ngay-13-gia-ca-phe-the-gioi-tiep-da-giam-ho-tieu-neo-o-nguong-148000-dongkg-192848.html","shareUrl":"/s/c/54580066.epi","publishedDate":1772326860,"totalLike":0,"status":1,"isNoAd":false,"tags":[{"name":"giá cà phê","url":"/tag/gi%C3%A1-c%C3%A0-ph%C3%AA.epi"},{"name":"hồ tiêu","url":"/tag/h%E1%BB%93-ti%C3%AAu.epi"},{"name":"trồi sụt","url":"/tag/tr%E1%BB%93i-s%E1%BB%A5t.epi"},{"name":"Muntok Indonesia","url":"/tag/Muntok-Indonesia.epi"},{"name":"ngưỡng","url":"/tag/ng%C6%B0%E1%BB%A1ng.epi"},{"name":"giằng co","url":"/tag/gi%E1%BA%B1ng-co.epi"},{"name":"Cục Hải quan Việt Nam","url":"/tag/C%E1%BB%A5c-H%E1%BA%A3i-quan-Vi%E1%BB%87t-Nam.epi"},{"name":"g/l","url":"/tag/g%2Fl.epi"},{"name":"nguồn cung","url":"/tag/ngu%E1%BB%93n-cung.epi"},{"name":"tiêu trắng","url":"/tag/ti%C3%AAu-tr%E1%BA%AFng.epi"},{"name":"sức ép","url":"/tag/s%E1%BB%A9c-%C3%A9p.epi"},{"name":"ICE","url":"/tag/ICE.epi"},{"name":"triển vọng","url":"/tag/tri%E1%BB%83n-v%E1%BB%8Dng.epi"},{"name":"Arabica","url":"/tag/Arabica.epi"},{"name":"cà phê","url":"/tag/c%C3%A0-ph%C3%AA.epi"},{"name":"giảm giá","url":"/tag/gi%E1%BA%A3m-gi%C3%A1.epi"},{"name":"cà phê Robusta","url":"/tag/c%C3%A0-ph%C3%AA-Robusta.epi"},{"name":"ASTA 570","url":"/tag/ASTA-570.epi"},{"name":"cà phê Arabica","url":"/tag/c%C3%A0-ph%C3%AA-Arabica.epi"},{"name":"Nicaragua","url":"/tag/Nicaragua.epi"}],"topTags":[{"id":14779,"objectType":13,"name":"Giá cà phê","aliasName":["giá cà phê","Giá cà phê","giá cafe","Giá cafe"],"thumb":"","url":"/gia-ca-phe-tag14779.epi"}],"bodys":[{"type":"image","content":"https://photo-baomoi.bmcdn.me/w700_r1/2026_03_01_578_54580066/6c43ef9cb0d4598a00c5.jpg","contentOrigin":"https://photo-baomoi.bmcdn.me/w1000_r1/2026_03_01_578_54580066/6c43ef9cb0d4598a00c5.jpg","lazyLoad":false,"width":700,"height":437,"widthOrigin":701,"heightOrigin":438,"originUrl":"https://thoibaotaichinhvietnam.vn/stores/news_dataimages/2026/032026/01/06/in_article/ngay-13-gia-ca-phe-the-gioi-tiep-da-giam-ho-tieu-neo-o-nguong-148000-dongkg-20260301062419.jpg?rt=20260301062419"},{"type":"text","content":"\u003cem\u003eGiá cà phê thế giới vẫn chịu sức ép giảm giá khi triển vọng nguồn cung toàn cầu trở nên tích cực hơn. Ảnh tư liệu\u003c/em\u003e","subType":"media-caption"},{"type":"text","content":"\u003cstrong\u003eGiá cà phê \u003ca class=\"tag-link\" href=\"/the-gioi.epi\"\u003ethế giới\u003c/a\u003e tiếp tục suy yếu\u003c/strong\u003e"},{"type":"text","content":"Trên thị trường thế giới, \u003ca class=\"tag-link\" href=\"/gia-ca-phe-tag14779.epi\"\u003egiá cà phê\u003c/a\u003e tiếp tục giảm. Kết thúc phiên giao dịch ngày 28/2, giá cà phê Robusta tại London ghi nhận phiên tăng giảm đan xen trong các kỳ giao hàng. Cụ thể, hợp đồng tháng 3/2026 tăng nhẹ 0,27% (10 USD/tấn) lên 3.699 USD/tấn, nhưng hợp đồng tháng 5/2026 lại giảm 14 USD/tấn xuống còn 3.624 USD/tấn."},{"type":"text","content":"Tại New York, giá cà phê Arabica tiếp tục suy yếu. Hợp đồng tháng 3/2026 giảm 1,4 US cent/pound xuống 284,6 US cent/pound; hợp đồng tháng 5/2026 giảm 1,55 US cent/pound còn 280,75 US cent/pound."},{"type":"text","content":"Theo Reuters, yếu tố gây sức ép lớn nhất hiện nay là lượng tồn kho arabica do ICE giám sát tăng mạnh. Tính đến ngày 26/2, tồn kho đạt 466.055 bao, tăng đáng kể so với mức 449.566 bao của tuần trước. Các nhà giao dịch cho biết nguồn cung bổ sung chủ yếu đến từ Honduras và Nicaragua."},{"type":"text","content":"Trái ngược với diễn biến giá giảm, số liệu xuất khẩu của Việt Nam cho thấy bức tranh tích cực. Theo thống kê của Cục Hải quan Việt Nam, tính đến ngày 15/2, cả nước đã xuất khẩu gần 319.000 tấn cà phê, thu về 1,53 tỷ USD, tăng 44,1% về lượng và 25,7% về trị giá so với cùng kỳ năm ngoái."},{"type":"text","content":"Trong nước, giá cà phê tại khu vực Tây Nguyên hôm nay đồng loạt giảm 800 - 1.000 đồng/kg so với hôm trước."},{"type":"text","content":"Đắk Lắk, Đắk Nông và Gia Lai hiện được thu mua phổ biến ở mức 96.000 đồng/kg, giảm 1.000 đồng/kg nhưng vẫn thuộc nhóm cao nhất cả nước. Lâm Đồng giảm 800 đồng/kg, còn 95.500 đồng/kg."},{"type":"text","content":"\u003cstrong\u003eGiá tiêu trong nước giảm 1.000 - 1.500 đồng/kg\u003c/strong\u003e"},{"type":"text","content":"Sau nhịp phục hồi ngắn cuối tháng 2, thị trường hồ tiêu trong nước bước sang ngày 1/3 với xu hướng điều chỉnh giảm trở lại. Diễn biến trồi sụt liên tiếp trong những phiên gần đây cho thấy cung - cầu vẫn đang trong trạng thái giằng co, đặc biệt khi vụ thu hoạch chính đang bước vào cao điểm. Mặt bằng giá nội địa hiện lùi về vùng 147.500 - 148.000 đồng/kg, thấp hơn so với ngưỡng 150.000 đồng/kg từng thiết lập trước đó."},{"type":"text","content":"Khảo sát tại các địa phương trồng tiêu trọng điểm cho thấy giá sáng nay đồng loạt quay đầu giảm. Tại Đắk Lắk và Bà Rịa - Vũng Tàu (TP. HCM), giá tiêu giảm mạnh nhất 1.500 đồng/kg, đưa mức thu mua về 148.000 đồng/kg. Đắk Nông (Lâm Đồng) giảm 1.000 đồng/kg và hiện cũng giao dịch quanh 148.000 đồng/kg."},{"type":"text","content":"Gia Lai và Đồng Nai cùng giảm 1.000 đồng/kg, phổ biến ở mức 147.500 đồng/kg – thấp nhất trong nhóm các tỉnh trọng điểm."},{"type":"text","content":"Trên thị trường quốc tế, giá tiêu Indonesia cũng giảm nhẹ. Theo dữ liệu từ Hiệp hội Hồ tiêu Quốc tế, giá tiêu đen xuất khẩu của Indonesia giảm 9 USD/tấn (tương đương 0,13%), xuống còn 7.011 USD/tấn. Giá tiêu trắng Muntok Indonesia cũng giảm 12 USD/tấn, còn 9.339 USD/tấn."},{"type":"text","content":"Trong khi đó, giá tiêu tại các quốc gia sản xuất lớn khác nhìn chung ổn định. Tiêu đen Brazil ASTA 570 tiếp tục đứng ở mức 6.175 USD/tấn; tiêu đen Malaysia duy trì 9.100 USD/tấn."},{"type":"text","content":"Giá tiêu đen xuất khẩu của Việt Nam vẫn dao động trong khoảng 6.400 - 6.600 USD/tấn đối với loại 500 g/l và 550 g/l. Giá tiêu trắng xuất khẩu của Việt Nam giữ ở mức 9.150 USD/tấn./."},{"type":"text","content":"\u003cstrong\u003eTuấn Anh (tổng hợp)\u003c/strong\u003e","subType":"body-author"}],"images":["https://photo-baomoi.bmcdn.me/w700_r1/2026_03_01_578_54580066/6c43ef9cb0d4598a00c5.jpg"],"embedUrl":"","tournamentId":"","isRichFormat":false,"category":{"id":127,"name":"Chứng khoán","url":"/chung-khoan.epi","shortUrl":"chung-khoan"},"forceRedirectUrl":"/ngay-1-3-gia-ca-phe-the-gioi-tiep-da-giam-ho-tieu-neo-o-nguong-148-000-dong-kg-r54580066.epi","cluster":{"id":10308925,"objectType":5,"name":"#cà phê Robusta","url":"/ca-phe-robusta-t18144022.epi","total":5535},"adBottomTVC":{"zoneId":"BaoMoi_ArticleBottomTVC","id":"BaoMoi_ArticleBottomTVC","elId":"BaoMoi_ArticleBottomTVC","type":"adNative"},"adBottomContent":["BaoMoi_Ariticle_Image"]},"sidebar":[{"sectionId":160,"url":"/app/get/sidebar","params":{"categoryId":45,"sectionIds":"119,102,115,104,121","pageType":0}}],"pageUrl":"/ngay-1-3-gia-ca-phe-the-gioi-tiep-da-giam-ho-tieu-neo-o-nguong-148-000-dong-kg-r54580066.epi","checkPageUrl":true,"preloadImageUrl":"https://photo-baomoi.bmcdn.me/w700_r1/2026_03_01_578_54580066/6c43ef9cb0d4598a00c5.jpg","title":"Ngày 1/3: Giá cà phê thế giới tiếp đà giảm, hồ tiêu neo ở ngưỡng 148.000 đồng/kg","adMasthead":{"elId":"BaoMoi_Masthead","zoneId":"2006008566803555488","zoneAdaptive":"","adtimaConfig":{}}},"version":"v.0.4.78","timestamp":1773653778936},"userAgent":"mozilla/5.0 (windows nt 10.0; win64; x64)","isBot":false,"hostName":"baomoi.com","isRedirectPage":true,"isBlankLayout":true},"__N_SSP":true},"page":"/content/redirect/[id]","query":{"id":"54580066"},"buildId":"80S9FUGKgR9deCNe9kO6R","assetPrefix":"https://baomoi-static.bmcdn.me/web-v2/prod/v0.7.77","isFallback":false,"gssp":true,"scriptLoader":[]}</script></body></html>
